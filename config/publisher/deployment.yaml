apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-publisher
  labels:
    app.kubernetes.io/name: orka
    app.kubernetes.io/component: workspace-publisher
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: orka
      app.kubernetes.io/component: workspace-publisher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orka
        app.kubernetes.io/component: workspace-publisher
        orka.ai/network-role: workspace-publisher
    spec:
      serviceAccountName: workspace-publisher
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: publisher
          image: docker.io/sozercan/orka-workspace-publisher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ORKA_PUBLISHER_LISTEN_ADDRESS
              value: :8080
            - name: ORKA_PUBLISHER_CONTROLLER_TOKEN_FILE
              value: /var/run/orka/publisher-auth/controller-token
            - name: ORKA_PUBLISHER_OPERATION_CAPABILITY_SECRET_FILE
              value: /var/run/orka/publisher-auth/operation-capability-secret
            - name: ORKA_PUBLISHER_ARTIFACT_CAPABILITY_SECRET_FILE
              value: /var/run/orka/artifact-auth/capability-secret
            - name: ORKA_PUBLISHER_ARTIFACT_API_URL
              value: http://orka-api.orka-system.svc:8080
            - name: ORKA_PUBLISHER_ALLOWED_SCM_HOSTS
              value: github.com
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp/orka-workspace-publisher
            - name: publisher-auth
              mountPath: /var/run/orka/publisher-auth
              readOnly: true
            - name: artifact-auth
              mountPath: /var/run/orka/artifact-auth
              readOnly: true
            - name: credentials
              mountPath: /var/run/secrets/orka-publisher/credentials
              readOnly: true
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: workspace-publisher
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: publisher-auth
          secret:
            secretName: workspace-publisher-auth
            defaultMode: 0400
        - name: artifact-auth
          secret:
            secretName: acp-artifact-capability
            defaultMode: 0400
        - name: credentials
          secret:
            secretName: workspace-publisher-credentials
            optional: true
            defaultMode: 0400
