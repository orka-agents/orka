# This rule is not used by the project orka itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to workspace.orka.ai resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
  name: workspace-executionworkspacepool-viewer-role
rules:
- apiGroups:
  - workspace.orka.ai
  resources:
  - executionworkspacepools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - workspace.orka.ai
  resources:
  - executionworkspacepools/status
  verbs:
  - get
