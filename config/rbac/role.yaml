---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.mercan.ai
  resources:
  - agents
  - providers
  - tasks
  - tools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.mercan.ai
  resources:
  - agents/finalizers
  - providers/finalizers
  - tasks/finalizers
  - tools/finalizers
  verbs:
  - update
- apiGroups:
  - core.mercan.ai
  resources:
  - agents/status
  - providers/status
  - tasks/status
  - tools/status
  verbs:
  - get
  - patch
  - update
