# This rule is not used by the project orka itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the workspace.orka.ai.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
  name: workspace-executionworkspaceclass-editor-role
rules:
- apiGroups:
  - workspace.orka.ai
  resources:
  - executionworkspaceclasses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workspace.orka.ai
  resources:
  - executionworkspaceclasses/status
  verbs:
  - get
