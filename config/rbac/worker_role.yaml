---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-worker
  namespace: system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vendor-worker
  namespace: system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: container-worker
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-worker-role
rules:
# ConfigMaps: read-only (skills, secrets lookup)
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
# Secrets: read existing credentials and create ephemeral code_exec code Secrets
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
# Orka Tool CRDs
- apiGroups:
  - core.orka.ai
  resources:
  - tools
  verbs:
  - get
  - list
# Orka Agent CRDs (for coordination: delegate_task type auto-detection, create_agent, delete_agent)
- apiGroups:
  - core.orka.ai
  resources:
  - agents
  verbs:
  - get
  - create
  - update
  - delete
# Orka Task CRDs (for coordination - delegate and wait)
- apiGroups:
  - core.orka.ai
  resources:
  - tasks
  verbs:
  - get
  - list
  - watch
  - create
# Broad read-only access to common cluster resources
- apiGroups:
  - ""
  resources:
  - pods
  - pods/status
  - nodes
  - services
  - endpoints
  - events
  - namespaces
  - persistentvolumes
  - persistentvolumeclaims
  - replicationcontrollers
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
# code_exec Kubernetes backend: per-job ServiceAccounts. This ClusterRole is
# bound through a ClusterRoleBinding, so these create/delete permissions are
# cluster-wide and reserved for the AI worker trust tier.
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  - cronjobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
# code_exec Kubernetes backend: deny-all NetworkPolicies
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - get
  - list
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  - nodes
  verbs:
  - get
  - list
---
