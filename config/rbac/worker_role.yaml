---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mercan-worker
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mercan-worker-role
rules:
# ConfigMaps: read + write (for result storage by AI/agent workers)
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - create
  - update
# Mercan Tool CRDs
- apiGroups:
  - core.mercan.ai
  resources:
  - tools
  verbs:
  - get
  - list
# Broad read-only access to common cluster resources
- apiGroups:
  - ""
  resources:
  - pods
  - pods/status
  - nodes
  - services
  - endpoints
  - events
  - namespaces
  - persistentvolumes
  - persistentvolumeclaims
  - replicationcontrollers
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  - cronjobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - networkpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - get
  - list
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  - nodes
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mercan-worker-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mercan-worker-role
subjects:
- kind: ServiceAccount
  name: mercan-worker
  namespace: system
