---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: container-worker-role
rules:
# Minimal Task metadata for Orka-managed general-worker tasks, which submit
# results/artifacts through the controller HTTP API using the worker ServiceAccount
# token. Custom-image container tasks do not mount this token and have their
# result collected from pod logs instead.
- apiGroups:
  - core.orka.ai
  resources:
  - tasks
  verbs:
  - get
