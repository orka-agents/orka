rules:
# ConfigMaps: read-only (skills, non-secret lookup)
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
# Orka Tool CRDs
- apiGroups:
  - core.orka.ai
  resources:
  - tools
  verbs:
  - get
  - list
# Orka Agent CRDs (for coordination: delegate_task type auto-detection, create_agent, delete_agent)
- apiGroups:
  - core.orka.ai
  resources:
  - agents
  verbs:
  - get
  - create
  - update
  - delete
# Orka Task CRDs (for coordination - delegate and wait)
- apiGroups:
  - core.orka.ai
  resources:
  - tasks
  verbs:
  - get
  - list
  - watch
  - create
# Broad read-only access to common cluster resources
- apiGroups:
  - ""
  resources:
  - pods
  - pods/status
  - nodes
  - services
  - endpoints
  - events
  - namespaces
  - persistentvolumes
  - persistentvolumeclaims
  - replicationcontrollers
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  - cronjobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - networkpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - get
  - list
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  - nodes
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: container-worker-role
rules:
# Minimal Task metadata only; results and artifacts are submitted through the
# controller HTTP API with the worker ServiceAccount token and do not require
# Kubernetes API resource permissions.
- apiGroups:
  - core.orka.ai
  resources:
  - tasks
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-worker-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-worker-role
subjects:
- kind: ServiceAccount
  name: ai-worker
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vendor-worker-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vendor-worker-role
subjects:
- kind: ServiceAccount
  name: vendor-worker
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: container-worker-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: container-worker-role
subjects:
- kind: ServiceAccount
  name: container-worker
  namespace: system
