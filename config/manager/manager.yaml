apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: orka
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: orka
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --store-backend=sqlite
          - --store-path=/data/orka.db
          - --controller-url=http://orka-api.orka-system.svc:8080
          - --acp-runtime-enabled=true
          - --ai-worker-image=ghcr.io/orka-agents/orka/ai-worker:latest
          - --general-worker-image=ghcr.io/orka-agents/orka/general-worker:latest
          - --execution-workspace-default-provider=agent-sandbox
          - --agent-sandbox-enabled=false
          - --agent-sandbox-warm-pool-policy=disabled
          - --agent-sandbox-namespace-strategy=task
          - --agent-sandbox-claim-timeout=2m
          - --agent-sandbox-command-timeout=30m
          - --agent-sandbox-cleanup-policy=delete
          - --substrate-enabled=false
          - --substrate-api-endpoint=api.ate-system.svc:443
          - --substrate-router-url=http://atenet-router.ate-system.svc
          - --substrate-actor-dns-suffix=actors.resources.substrate.ate.dev
          - --substrate-claim-timeout=2m
          - --substrate-command-timeout=30m
          - --substrate-cleanup-policy=delete
        image: controller:latest
        imagePullPolicy: IfNotPresent
        name: manager
        env:
          - name: ORKA_ACP_ARTIFACT_CAPABILITY_SECRET_FILE
            value: /var/run/orka/acp-artifacts/capability-secret
          - name: ORKA_ACP_ARTIFACT_ROOT
            value: /data/acp-artifacts
          - name: ORKA_ACP_CODEX_RUNTIME_IMAGE
            valueFrom:
              configMapKeyRef:
                name: acp-runtime-images
                key: ORKA_ACP_CODEX_RUNTIME_IMAGE
          - name: ORKA_ACP_CLAUDE_RUNTIME_IMAGE
            valueFrom:
              configMapKeyRef:
                name: acp-runtime-images
                key: ORKA_ACP_CLAUDE_RUNTIME_IMAGE
          - name: ORKA_WORKSPACE_PUBLISHER_URL
            value: http://orka-workspace-publisher.orka-system.svc:8080
          - name: ORKA_WORKSPACE_PUBLISHER_CONTROLLER_TOKEN_FILE
            value: /var/run/orka/publisher-auth/controller-token
          - name: ORKA_WORKSPACE_PUBLISHER_CAPABILITY_SECRET_FILE
            value: /var/run/orka/publisher-auth/operation-capability-secret
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
          - name: store
            mountPath: /data
          - name: tmp
            mountPath: /tmp
          - name: acp-artifact-capability
            mountPath: /var/run/orka/acp-artifacts
            readOnly: true
          - name: workspace-publisher-auth
            mountPath: /var/run/orka/publisher-auth
            readOnly: true
      volumes:
        - name: store
          persistentVolumeClaim:
            claimName: controller-manager-store
        - name: tmp
          emptyDir: {}
        - name: acp-artifact-capability
          secret:
            secretName: acp-artifact-capability
            defaultMode: 0400
            items:
              - key: capability-secret
                path: capability-secret
        - name: workspace-publisher-auth
          secret:
            secretName: workspace-publisher-auth
            defaultMode: 0400
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
