# Adds namespace to all resources.
namespace: orka-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: orka-

# Labels to add to all resources and selectors.
#labels:
#- includeSelectors: true
#  pairs:
#    someName: someValue

configurations:
- kustomizeconfig.yaml

resources:
- ../crd
- ../rbac
- ../manager
- ../harness-wrapper
- ../admission
- ../policy
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
#- ../webhook
# [METRICS] Expose the controller manager metrics service.
- metrics_service.yaml
# [API] Expose the controller manager API service for worker result submission.
- api_service.yaml
# Uncomment the patches line if you enable Metrics
patches:
# [METRICS] The following patch will enable the metrics endpoint using HTTPS and the port :8443.
# More info: https://book.kubebuilder.io/reference/metrics
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
    name: controller-manager

# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
#- path: manager_webhook_patch.yaml
#  target:
#    kind: Deployment
#    name: controller-manager

# Webhook CA injection replacements are intentionally not configured here.
# Future webhook CA bundle injection should be wired into the manager runtime.
# +kubebuilder:scaffold:crdkustomizecainjectionns
# +kubebuilder:scaffold:crdkustomizecainjectionname

replacements:
- source:
    group: ""
    version: v1
    kind: Namespace
    name: system
    fieldPath: metadata.name
  targets:
  - select:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicy
      name: gateway-task-protection
    fieldPaths:
    - spec.variables.[name=controllerNamespace].expression
    options:
      delimiter: "'"
      index: 1
- source:
    group: ""
    version: v1
    kind: ServiceAccount
    name: controller-manager
    fieldPath: metadata.name
  targets:
  - select:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicy
      name: gateway-task-protection
    fieldPaths:
    - spec.variables.[name=controllerServiceAccount].expression
    options:
      delimiter: "'"
      index: 1
- source:
    group: ""
    version: v1
    kind: ServiceAccount
    name: ai-worker
    fieldPath: metadata.name
  targets:
  - select:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicy
      name: gateway-task-protection
    fieldPaths:
    - spec.variables.[name=aiWorkerServiceAccount].expression
    options:
      delimiter: "'"
      index: 1
- source:
    group: ""
    version: v1
    kind: ServiceAccount
    name: vendor-worker
    fieldPath: metadata.name
  targets:
  - select:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicy
      name: gateway-task-protection
    fieldPaths:
    - spec.variables.[name=vendorWorkerServiceAccount].expression
    options:
      delimiter: "'"
      index: 1
- source:
    group: ""
    version: v1
    kind: ServiceAccount
    name: container-worker
    fieldPath: metadata.name
  targets:
  - select:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicy
      name: gateway-task-protection
    fieldPaths:
    - spec.variables.[name=containerWorkerServiceAccount].expression
    options:
      delimiter: "'"
      index: 1

transformers:
- remove_admission_policy_namespace.yaml
- remove_admission_policy_binding_namespace.yaml
