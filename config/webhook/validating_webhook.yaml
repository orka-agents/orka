apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: task-provenance-validating-webhook
  labels:
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
webhooks:
- name: taskprovenance.core.orka.ai
  admissionReviewVersions:
  - v1
  sideEffects: None
  # This opt-in manifest defaults to Ignore so a webhook endpoint without an
  # injected clientConfig.caBundle cannot block Task writes. Change this to Fail
  # only after webhook-server-cert is provisioned and caBundle injection is
  # configured for this ValidatingWebhookConfiguration.
  failurePolicy: Ignore
  matchPolicy: Equivalent
  timeoutSeconds: 10
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-core-orka-ai-v1alpha1-task-provenance
      port: 443
    # Set caBundle to the PEM CA bundle for webhook-server-cert, or configure
    # your certificate manager to inject it before enabling this webhook.
  rules:
  - operations:
    - CREATE
    - UPDATE
    apiGroups:
    - core.orka.ai
    apiVersions:
    - v1alpha1
    resources:
    - tasks
    scope: Namespaced
