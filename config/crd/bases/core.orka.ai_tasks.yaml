                    default: 0
                    description: MaxRetries is the maximum number of retry attempts
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              schedule:
                description: |-
                  Schedule is a cron expression for recurring tasks (e.g., "0 */6 * * *").
                  When set, the controller creates child Task CRs on each cron tick.
                type: string
              secretRef:
                description: SecretRef references a Kubernetes Secret containing credentials
                properties:
                  name:
                    description: Name is the name of the Secret
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Secret (defaults
                      to Task namespace)
                    type: string
                required:
                - name
                type: object
              sessionRef:
                description: SessionRef references a session for conversation continuity
                properties:
                  append:
                    default: true
                    description: Append indicates whether to append task messages
                      to the session transcript
                    type: boolean
                  create:
                    default: false
                    description: Create indicates whether to create the session if
                      it doesn't exist
                    type: boolean
                  maxMessages:
                    default: 50
                    description: MaxMessages is the maximum number of messages to
                      load from session
                    format: int32
                    minimum: 1
                    type: integer
                  name:
                    description: 'Name is the session identifier (ConfigMap: session-<name>)'
                    type: string
                required:
                - name
                type: object
              startingDeadlineSeconds:
                default: 100
                description: |-
                  StartingDeadlineSeconds is the deadline in seconds for starting a missed scheduled run.
                  If the schedule is missed by more than this many seconds, the run is skipped.
                format: int64
                type: integer
              successfulRunsHistoryLimit:
                default: 3
                description: SuccessfulRunsHistoryLimit is the number of successful
                  child tasks to retain.
                format: int32
                minimum: 0
                type: integer
              suspend:
                description: |-
                  Suspend tells the controller to suspend subsequent scheduled runs.
                  It does not apply to already started child tasks. Defaults to false.
                type: boolean
              timeZone:
                description: |-
                  TimeZone is the IANA time zone for the schedule (e.g., "America/New_York").
                  Defaults to UTC if not set.
                type: string
              timeout:
                description: Timeout is the maximum duration for the task
                type: string
              type:
                description: 'Type specifies the task type: "container" or "ai"'
                enum:
                - container
                - ai
                - agent
                type: string
              webhookURL:
                description: WebhookURL is the URL to call when the task completes
                type: string
            required:
            - type
            type: object
          status:
            description: TaskStatus defines the observed state of Task
            properties:
              attempts:
                description: Attempts is the number of attempts made
                format: int32
                type: integer
              childTasks:
                description: ChildTasks tracks delegated child tasks (for coordinator
                  agents)
                items:
                  description: ChildTaskStatus tracks the status of a delegated child
                    task
                  properties:
                    agent:
                      description: Agent is the agent handling the child task
                      type: string
                    name:
                      description: Name is the name of the child task
                      type: string
                    phase:
                      description: Phase is the current phase of the child task
                      enum:
                      - Pending
                      - Running
                      - Succeeded
                      - Failed
                      - Scheduled
                      - Cancelled
                      type: string
                    result:
                      description: Result is the result from the child task (if completed)
                      type: string
                  required:
                  - agent
                  - name
                  - phase
                  type: object
                type: array
              completionTime:
                description: CompletionTime is when the task completed
                format: date-time
                type: string
              conditions:
                description: Conditions represent the current state of the Task
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              iteration:
                description: |-
                  Iteration is the current autonomous loop iteration (0-based).
                  Only used when the task's coordination config has autonomous mode enabled.
                format: int32
                type: integer
              jobName:
                description: JobName is the name of the Kubernetes Job running the
                  task
                type: string
              lastScheduleTime:
                description: LastScheduleTime is the last time a child task was created
                  for a scheduled run.
                format: date-time
                type: string
              message:
                description: Message provides additional status information
                type: string
              nextScheduleTime:
                description: NextScheduleTime is the next time a child task will be
                  created.
                format: date-time
                type: string
              phase:
                description: Phase is the current phase of the task
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                - Scheduled
                - Cancelled
                type: string
              resultRef:
                description: ResultRef indicates whether a result is available
                properties:
                  available:
                    description: Available indicates whether a result has been stored
                      for this task
                    type: boolean
                required:
                - available
                type: object
              startTime:
                description: StartTime is when the task started running
                format: date-time
                type: string
              webhookDelivered:
                description: WebhookDelivered indicates whether the webhook was successfully
                  called
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
