---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: agents.core.mercan.ai
spec:
  group: core.mercan.ai
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.model.provider
      name: Provider
      type: string
    - jsonPath: .spec.model.name
      name: Model
      type: string
    - jsonPath: .status.activeTasks
      name: Active
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Agent is the Schema for the agents API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentSpec defines the desired state of Agent
            properties:
              coordination:
                description: Coordination enables agent-to-agent delegation
                properties:
                  allowedAgents:
                    description: AllowedAgents lists agents this agent can delegate
                      to
                    items:
                      description: AllowedAgent defines an agent that can be delegated
                        to
                      properties:
                        name:
                          description: Name is the name of the agent
                          type: string
                        namespace:
                          description: Namespace is the namespace of the agent (defaults
                            to same namespace)
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  enabled:
                    default: false
                    description: Enabled indicates if coordination is enabled
                    type: boolean
                  maxConcurrentChildren:
                    default: 5
                    description: MaxConcurrentChildren limits concurrent child tasks
                    format: int32
                    minimum: 1
                    type: integer
                  maxDepth:
                    default: 3
                    description: MaxDepth limits delegation depth to prevent infinite
                      loops
                    format: int32
                    maximum: 10
                    minimum: 1
                    type: integer
                required:
                - enabled
                type: object
              model:
                description: |-
                  Model defines the LLM model configuration
                  Provider field is optional if providerRef is set
                properties:
                  fallbacks:
                    description: |-
                      Fallbacks defines alternative providers to try when the primary fails.
                      Each fallback specifies a Provider CRD and optional model override.
                    items:
                      description: ModelFallback defines a fallback provider configuration
                      properties:
                        model:
                          description: Model to use with this provider (optional,
                            uses provider's defaultModel if empty)
                          type: string
                        providerRef:
                          description: ProviderRef is the name of a Provider CRD to
                            fall back to
                          type: string
                      required:
                      - providerRef
                      type: object
                    type: array
                  maxTokens:
                    description: MaxTokens limits the response length
                    format: int32
                    type: integer
                  name:
                    description: |-
                      Name is the model identifier
                      Optional if providerRef is set and Provider has defaultModel
                    type: string
                  provider:
                    description: |-
                      Provider is the LLM provider (anthropic, openai)
                      Optional if providerRef is set on the Agent
                    enum:
                    - anthropic
                    - openai
                    type: string
                  temperature:
                    default: 0.7
                    description: Temperature controls randomness in generation
                    maximum: 2
                    minimum: 0
                    type: number
                type: object
              providerRef:
                description: |-
                  ProviderRef references a Provider CRD for LLM configuration
                  If set, model.provider is optional (inherited from Provider)
                properties:
                  name:
                    description: Name is the name of the Provider
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Provider (defaults
                      to Task namespace)
                    type: string
                required:
                - name
                type: object
              rateLimit:
                description: RateLimit defines rate limiting configuration
                properties:
                  requestsPerMinute:
                    description: RequestsPerMinute limits requests per minute
                    format: int32
                    type: integer
                  tokensPerMinute:
                    description: TokensPerMinute limits tokens per minute
                    format: int64
                    type: integer
                type: object
              resources:
                description: Resources defines the resource limits for tasks using
                  this agent
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              runtime:
                description: |-
                  Runtime configures this Agent for external CLI runtimes (type: agent tasks).
                  When set, this Agent is for type: agent tasks only (mutually exclusive with providerRef).
                properties:
                  defaultAllowBash:
                    default: true
                    description: DefaultAllowBash controls whether bash is allowed
                      by default for tasks using this Agent
                    type: boolean
                  defaultAllowedTools:
                    description: DefaultAllowedTools lists the default tools allowed
                      for tasks using this Agent
                    items:
                      type: string
                    type: array
                  defaultMaxTurns:
                    default: 50
                    description: DefaultMaxTurns is the default maximum agent loop
                      iterations for tasks using this Agent
                    format: int32
                    maximum: 1000
                    minimum: 1
                    type: integer
                  type:
                    description: Type specifies which CLI runtime to use
                    enum:
                    - copilot
                    - claude
                    type: string
                required:
                - type
                type: object
              secretRef:
                description: SecretRef references a Secret containing LLM API keys
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              session:
                description: Session defines session configuration defaults
                properties:
                  maxMessages:
                    default: 50
                    description: MaxMessages is the maximum messages to load from
                      session
                    format: int32
                    minimum: 1
                    type: integer
                  persistence:
                    default: configmap
                    description: Persistence defines the storage backend (configmap,
                      pvc, none)
                    enum:
                    - configmap
                    - pvc
                    - none
                    type: string
                  ttl:
                    description: TTL defines the session time-to-live (auto-expire)
                    type: string
                type: object
              skills:
                description: Skills lists the default skills for this agent
                items:
                  description: SkillReference references a ConfigMap containing a
                    skill definition
                  properties:
                    configMapRef:
                      description: ConfigMapRef references the ConfigMap containing
                        the skill
                      properties:
                        key:
                          default: skill.md
                          description: Key is the key within the ConfigMap (defaults
                            to "skill.md")
                          type: string
                        name:
                          description: Name is the name of the ConfigMap
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - configMapRef
                  type: object
                type: array
              systemPrompt:
                description: SystemPrompt defines the system prompt configuration
                properties:
                  configMapRef:
                    description: ConfigMapRef references a ConfigMap containing the
                      prompt
                    properties:
                      key:
                        description: Key is the key within the ConfigMap
                        type: string
                      name:
                        description: Name is the name of the ConfigMap
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  inline:
                    description: Inline is the inline prompt text
                    type: string
                type: object
              tools:
                description: Tools lists the default tools available to this agent
                items:
                  description: ToolReference references a tool for an agent
                  properties:
                    enabled:
                      default: true
                      description: 'Enabled indicates if the tool is enabled (default:
                        true)'
                      type: boolean
                    name:
                      description: Name is the tool name (built-in or Tool CRD name)
                      type: string
                  required:
                  - name
                  type: object
                type: array
              ttlAfterLastTask:
                description: |-
                  TTLAfterLastTask defines how long the agent persists after its last task completes.
                  When set and no tasks are active, the agent is deleted after this duration.
                  Zero means the agent is never auto-deleted (permanent). Default is no TTL (permanent).
                type: string
            type: object
          status:
            description: AgentStatus defines the observed state of Agent
            properties:
              activeTasks:
                description: ActiveTasks is the number of active tasks using this
                  agent
                format: int32
                type: integer
              conditions:
                description: Conditions represent the current state of the Agent
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUsed:
                description: LastUsed is the timestamp of when this agent was last
                  used
                format: date-time
                type: string
            required:
            - activeTasks
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
