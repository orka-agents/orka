---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: agentruntimes.core.orka.ai
spec:
  group: core.orka.ai
  names:
    kind: AgentRuntime
    listKind: AgentRuntimeList
    plural: agentruntimes
    singular: agentruntime
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .spec.contractVersion
      name: Contract
      type: string
    - jsonPath: .spec.deployment.mode
      name: Mode
      type: string
    - jsonPath: .status.observedCapabilities.runtimeName
      name: Runtime
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentRuntime is the Schema for registered Orka harness runtimes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentRuntimeRegistrySpec defines the desired state of a registered
              Orka harness runtime.
            properties:
              capabilities:
                description: Capabilities declares readiness requirements Orka checks
                  against the runtime.
                properties:
                  supportsCancel:
                    description: SupportsCancel requires the runtime to advertise
                      cancellation support when true.
                    type: boolean
                  supportsRuntimeSessions:
                    description: SupportsRuntimeSessions requires the runtime to advertise
                      stable runtime sessions when true.
                    type: boolean
                  toolExecutionModes:
                    description: ToolExecutionModes lists tool execution modes the
                      runtime must advertise.
                    items:
                      description: AgentRuntimeToolExecutionMode declares how custom
                        runtimes interact with tools.
                      enum:
                      - observed
                      - brokered
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                type: object
              clientAuth:
                description: ClientAuth configures controller-to-runtime authentication.
                properties:
                  bearerTokenSecretRef:
                    description: |-
                      BearerAuthRef points to the bearer token Secret used for mutating harness endpoints.
                      The referenced Secret must opt in with label orka.ai/agent-runtime-auth=true;
                      it may also set orka.ai/agent-runtime-name=<runtime> to restrict use to one AgentRuntime.
                    properties:
                      key:
                        description: Key is the Secret data key containing the bearer
                          token.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - bearerTokenSecretRef
                type: object
              contractVersion:
                default: orka.harness.v1
                description: ContractVersion is the Orka harness contract this runtime
                  must implement.
                enum:
                - orka.harness.v1
                type: string
              deployment:
                description: Deployment identifies the runtime endpoint provider.
                properties:
                  endpoint:
                    description: |-
                      Endpoint is the base URL for a pre-deployed or external orka.harness.v1 service.
                      It must not contain credentials; bearer auth is configured via clientAuth.
                    pattern: ^https?://[^\s@?#]+$
                    type: string
                  mode:
                    description: Mode is the deployment mode. The first milestone
                      supports external endpoints only.
                    enum:
                    - external-endpoint
                    type: string
                required:
                - endpoint
                - mode
                type: object
            required:
            - clientAuth
            - contractVersion
            - deployment
            type: object
          status:
            description: AgentRuntimeStatus defines the observed state of an AgentRuntime.
            properties:
              conditions:
                description: Conditions represent the current state of the AgentRuntime.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastValidated:
                description: LastValidated is the timestamp of the last readiness
                  probe.
                format: date-time
                type: string
              message:
                description: Message provides sanitized readiness context.
                type: string
              observedCapabilities:
                description: ObservedCapabilities contains sanitized capabilities
                  from the last probe.
                properties:
                  maxConcurrentTurns:
                    description: MaxConcurrentTurns is the advertised concurrency
                      ceiling.
                    type: integer
                  protocolVersion:
                    description: ProtocolVersion is the runtime's advertised Orka
                      protocol version.
                    type: string
                  providerKind:
                    description: ProviderKind is the provider kind advertised by /v1/capabilities.
                    type: string
                  runtimeName:
                    description: RuntimeName is the runtime name advertised by /v1/capabilities.
                    type: string
                  runtimeVersion:
                    description: RuntimeVersion is the runtime version advertised
                      by /v1/capabilities.
                    type: string
                  supportsCancel:
                    description: SupportsCancel reports whether the runtime advertises
                      cancellation support.
                    type: boolean
                  supportsRuntimeSessions:
                    description: SupportsRuntimeSessions reports whether the runtime
                      advertises runtime-session support.
                    type: boolean
                  supportsSuspend:
                    description: SupportsSuspend reports whether the runtime advertises
                      suspend support.
                    type: boolean
                  supportsWorkspaceSnapshot:
                    description: SupportsWorkspaceSnapshot reports whether the runtime
                      advertises workspace snapshots.
                    type: boolean
                  toolExecutionModes:
                    description: ToolExecutionModes are the tool modes advertised
                      by /v1/capabilities.
                    items:
                      description: AgentRuntimeToolExecutionMode declares how custom
                        runtimes interact with tools.
                      enum:
                      - observed
                      - brokered
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  transport:
                    description: Transport is the runtime transport, normally http+sse.
                    type: string
                type: object
              observedGeneration:
                description: ObservedGeneration is the latest generation reconciled
                  into this status.
                format: int64
                type: integer
              ready:
                description: Ready indicates the runtime passed the configured Orka
                  readiness checks.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
