    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SubstrateActorPool is the Schema for Substrate actor pools.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SubstrateActorPoolSpec defines an operator-owned oversubscription
              pool.
            properties:
              precreateActors:
                description: |-
                  PrecreateActors asks the controller to create deterministic warm actors up
                  to TargetActors. Substrate may suspend them when the WorkerPool is full.
                type: boolean
              targetActors:
                description: |-
                  TargetActors is the desired number of stateful actors tracked for this
                  pool. It may exceed TargetWorkers to express oversubscription.
