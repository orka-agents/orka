                minimum: 0
                type: integer
              templateRef:
                description: TemplateRef is the ActorTemplate used for pool members.
                properties:
                  name:
                    description: Name is the name of the workspace template.
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of the workspace template and claim.
                      It defaults to the Task namespace, or the controller namespace when configured.
                    type: string
                type: object
              workerPoolRef:
                description: WorkerPoolRef is the Substrate WorkerPool this Orka pool
