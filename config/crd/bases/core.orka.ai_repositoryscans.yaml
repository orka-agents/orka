                type: string
              forkRepo:
                description: ForkRepo is the writable fork repository URL used for
                  patch proposals.
                type: string
              gitSecretRef:
                description: GitSecretRef references git credentials for private repositories.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              historyDays:
                description: HistoryDays controls how far back the initial scan should
                  inspect repository history.
                format: int32
                type: integer
              maxFindingsPerRun:
                description: MaxFindingsPerRun bounds scan output volume.
                format: int32
                type: integer
              owner:
                description: Owner is the repository owner or organization.
                type: string
              patchAgentRef:
                description: PatchAgentRef is the agent used for patch proposal runs.
                properties:
                  name:
                    description: Name is the name of the Agent
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Agent (defaults
                      to Task namespace)
                    type: string
                required:
                - name
                type: object
              prBaseBranch:
                description: PRBaseBranch is the pull request base branch for remediation.
                type: string
              provider:
                default: github
                description: Provider is the source control provider. GitHub is the
