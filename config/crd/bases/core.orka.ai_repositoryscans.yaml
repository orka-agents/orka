kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: repositoryscans.core.orka.ai
spec:
  group: core.orka.ai
  names:
    kind: RepositoryScan
    listKind: RepositoryScanList
    plural: repositoryscans
    singular: repositoryscan
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.repository
