                type: string
              repoURL:
                description: RepoURL is the repository URL to scan.
                type: string
              repository:
                description: Repository is the repository name.
                type: string
              schedule:
                description: Schedule is the cron expression for incremental scans.
                type: string
              subPath:
                description: SubPath scopes scanning to a subdirectory in a monorepo.
                type: string
              suspend:
                description: Suspend pauses scheduled incremental scans.
