                type: string
              lastProcessedCommit:
                description: LastProcessedCommit is the latest commit fully processed
                  by a completed scan.
                type: string
              lastScanAt:
                description: LastScanAt is the completion time of the most recent
                  scan run, regardless of success or failure.
                format: date-time
                type: string
              lastScanID:
                description: LastScanID is the most recent scan run identifier stored
                  in SQLite.
                type: string
              lastScanTaskName:
                description: LastScanTaskName is the most recent scan task name.
                type: string
              lastSuccessfulScanAt:
                description: LastSuccessfulScanAt is the completion time of the most
                  recent successful scan.
                format: date-time
                type: string
              phase:
                description: Phase describes the high-level repository scan lifecycle
