      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RepositoryScan is the Schema for the repository security scanning
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RepositoryScanSpec defines the desired state of RepositoryScan.
            properties:
              analysisAgentRef:
                description: AnalysisAgentRef is the agent used for scan runs.
                properties:
                  name:
                    description: Name is the name of the Agent
                    type: string
                  namespace:
                    description: Namespace is the namespace of the Agent (defaults
                      to Task namespace)
                    type: string
                required:
                - name
                type: object
              branch:
                description: Branch is the base branch to scan. Defaults to the repository
