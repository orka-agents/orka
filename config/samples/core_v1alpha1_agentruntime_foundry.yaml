apiVersion: core.orka.ai/v1alpha1
kind: AgentRuntime
metadata:
  labels:
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
  name: sample-foundry-runtime
spec:
  # Namespace-local facade for the separately deployed orka-agents/agent-runtime-foundry
  # Hosted Agents Responses adapter. Azure authentication belongs to the adapter deployment
  # (for example, Workload Identity). Orka Tool credentials remain Orka-governed.
  contractVersion: orka.harness.v1
  deployment:
    mode: external-endpoint
    endpoint: http://sample-foundry-runtime.default.svc.cluster.local:8080
  clientAuth:
    bearerTokenSecretRef:
      name: sample-foundry-runtime-token
      key: token
  capabilities:
    # The adapter is observed-only by default. Advertise brokered classes only after
    # enabling ORKA_FOUNDRY_BROKERED_TOOL_CLASSES and passing matching conformance probes.
    toolExecutionModes:
    - observed
    supportsCancel: true
    supportsRuntimeSessions: true
