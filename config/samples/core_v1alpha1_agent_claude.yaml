apiVersion: core.mercan.ai/v1alpha1
kind: Agent
metadata:
  name: claude-agent
  labels:
    app.kubernetes.io/name: mercan
    app.kubernetes.io/managed-by: kustomize
spec:
  # model configures the LLM (passed as --model flag to Claude CLI)
  model:
    name: "claude-sonnet-4-20250514"
  # systemPrompt is injected via --system-prompt; can also use configMapRef
  systemPrompt:
    inline: "You are a helpful coding assistant."
  # secretRef references a Secret containing ANTHROPIC_API_KEY
  secretRef:
    name: claude-api-key
  # runtime marks this Agent for type: agent tasks using Claude Code CLI
  # (mutually exclusive with providerRef, which is for type: ai tasks)
  runtime:
    # type selects the CLI runtime: "claude" or "copilot"
    type: claude
    # defaultMaxTurns is the default max agent loop iterations per task
    defaultMaxTurns: 50
    # defaultAllowBash enables bash commands by default for tasks using this Agent
    defaultAllowBash: true
    # defaultAllowedTools lists the Claude CLI tools available by default
    defaultAllowedTools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
