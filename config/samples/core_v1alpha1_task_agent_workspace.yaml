apiVersion: core.orka.ai/v1alpha1
kind: Task
metadata:
  name: agent-task-workspace-example
  labels:
    app.kubernetes.io/name: orka
    app.kubernetes.io/managed-by: kustomize
spec:
  # type: agent delegates work to an external CLI runtime
  type: agent
  # Reference an Agent with runtime configured (e.g., claude-agent)
  agentRef:
    name: claude-agent
  # Prompt for the agent to execute in the cloned workspace
  prompt: "Fix the failing CI tests in the api/ directory"
  # Workspace git clone configuration. Prefer this top-level field for new tasks.
  workspace:
    # gitRepo is the repository URL to clone into the workspace
    gitRepo: "https://github.com/example/my-project.git"
    # branch to checkout (optional, defaults to repo default branch)
    branch: "feature/fix-tests"
    # ref can be a specific commit SHA or tag (optional, mutually exclusive with branch)
    # ref: "abc123"
    # gitSecretRef references a Secret with git credentials for private repos
    gitSecretRef:
      name: git-credentials
    # subPath restricts the workspace root to a subdirectory of the repo
    # subPath: "services/api"
  # Agent runtime overrides
  agentRuntime:
    maxTurns: 100
    allowBash: true
    # allowedTools overrides the Agent's defaultAllowedTools for this task
    allowedTools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
  timeout: "30m"
  priority: 600
