                    type: integer
                  protocolVersion:
                    description: ProtocolVersion is the runtime's advertised Orka
                      protocol version.
                    type: string
                  providerKind:
                    description: ProviderKind is the provider kind advertised by /v1/capabilities.
                    type: string
                  runtimeName:
                    description: RuntimeName is the runtime name advertised by /v1/capabilities.
                    type: string
                  runtimeVersion:
                    description: RuntimeVersion is the runtime version advertised
                      by /v1/capabilities.
                    type: string
                  supportsArtifacts:
                    description: SupportsArtifacts reports whether the runtime advertises
                      artifact/result reference support.
                    type: boolean
                  supportsCancel:
                    description: SupportsCancel reports whether the runtime advertises
                      cancellation support.
                    type: boolean
                  supportsContinuation:
                    description: SupportsContinuation reports whether the runtime
