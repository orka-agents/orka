                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastValidated:
                description: LastValidated is the timestamp of the last readiness
                  probe.
                format: date-time
                type: string
              message:
                description: Message provides sanitized readiness context.
                type: string
              observedAuthRefResourceVersion:
                description: |-
                  ObservedAuthRefResourceVersion is the resourceVersion of the bearer auth Secret
                  used for the last readiness probe. It is non-secret metadata used to decide
                  when token rotation requires a fresh authenticated conformance turn.
                type: string
              observedCapabilities:
                description: ObservedCapabilities contains sanitized capabilities
                  from the last probe.
                properties:
                  brokeredToolClasses:
                    description: BrokeredToolClasses are the brokered tool classes
                      advertised by /v1/capabilities.
                    items:
                      description: AgentRuntimeBrokeredToolClass declares which classes
