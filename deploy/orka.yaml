apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: agent-harness-wrapper
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: orka
  name: orka-agent-harness-wrapper
  namespace: orka-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: agent-harness-wrapper
      app.kubernetes.io/name: orka
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: agent-harness-wrapper
        app.kubernetes.io/name: orka
    spec:
      automountServiceAccountToken: false
      containers:
      - env:
        - name: ORKA_HARNESS_WRAPPER_RUNTIME
          value: multi
        - name: ORKA_HARNESS_WRAPPER_LISTEN_ADDR
          value: :8080
        - name: ORKA_HARNESS_WRAPPER_BEARER_TOKEN_FILE
          value: /var/run/orka/harness-wrapper/token
        - name: ORKA_ALLOW_BASH
          value: "true"
        - name: ORKA_HARNESS_WRAPPER_CHILD_UID
          value: "1000"
        - name: ORKA_HARNESS_WRAPPER_CHILD_GID
          value: "1000"
        - name: ORKA_CODEX_SANDBOX_MODE
          value: danger-full-access
        - name: ORKA_SA_TOKEN_PATH
          value: /var/run/orka/upload-token/token
        image: ghcr.io/orka-agents/orka/agent-harness-wrapper:0.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
        name: wrapper
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - SETUID
            - SETGID
            - CHOWN
            - KILL
            - FOWNER
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /var/run/orka/harness-wrapper
          name: auth
          readOnly: true
        - mountPath: /var/run/orka/upload-token
          name: upload-token
          readOnly: true
        - mountPath: /tmp
          name: tmp
      securityContext:
        runAsGroup: 0
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: orka-agent-harness-wrapper
      volumes:
      - name: upload-token
        projected:
          defaultMode: 256
          sources:
          - serviceAccountToken:
              path: token
      - name: auth
        secret:
          defaultMode: 256
          secretName: harness-wrapper-auth
      - emptyDir: {}
        name: tmp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: orka
    control-plane: controller-manager
  name: orka-controller-manager
  namespace: orka-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orka
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: orka
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --store-backend=sqlite
        - --store-path=/data/orka.db
        - --controller-url=http://orka-api.orka-system.svc:8080
        - --ai-worker-image=ghcr.io/orka-agents/orka/ai-worker:0.1.0
        - --general-worker-image=ghcr.io/orka-agents/orka/general-worker:0.1.0
        - --execution-workspace-default-provider=agent-sandbox
        - --agent-sandbox-enabled=false
        - --agent-sandbox-warm-pool-policy=disabled
        - --agent-sandbox-namespace-strategy=task
        - --agent-sandbox-claim-timeout=2m
        - --agent-sandbox-command-timeout=30m
        - --agent-sandbox-cleanup-policy=delete
        - --substrate-enabled=false
        - --substrate-api-endpoint=api.ate-system.svc:443
        - --substrate-router-url=http://atenet-router.ate-system.svc
        - --substrate-actor-dns-suffix=actors.resources.substrate.ate.dev
        - --substrate-claim-timeout=2m
        - --substrate-command-timeout=30m
        - --substrate-cleanup-policy=delete
        command:
        - /manager
        env:
        - name: ORKA_HARNESS_WRAPPER_ENDPOINT
          value: http://orka-agent-harness-wrapper:8080
        - name: ORKA_HARNESS_WRAPPER_BEARER_TOKEN_FILE
          value: /var/run/orka/harness-wrapper/token
        - name: ORKA_HARNESS_WRAPPER_SERVICE_ACCOUNT_NAME
          value: orka-agent-harness-wrapper
        image: ghcr.io/orka-agents/orka:0.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /data
          name: store
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/run/orka/harness-wrapper
          name: harness-wrapper-auth
          readOnly: true
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: orka-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - emptyDir: {}
        name: store
      - emptyDir: {}
        name: tmp
      - name: harness-wrapper-auth
        secret:
          secretName: harness-wrapper-auth
