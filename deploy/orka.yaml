          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ToolSpec defines the desired state of Tool
            properties:
              brokeredToolClass:
                description: |-
                  BrokeredToolClass declares the governed class for remote AgentRuntime brokered calls.
                  Tools without this field are not exposed to remote runtimes through brokered governance.
                enum:
                - read
                - write
                - coordination
                type: string
              description:
                description: Description is the tool description shown to the LLM
                type: string
              http:
                description: |-
                  HTTP defines the HTTP execution configuration. It is required unless MCP
                  is set.
                properties:
                  authBodyKey:
                    description: |-
                      AuthBodyKey is the JSON key name to use when AuthInject=body
                      For example, "api_key" would inject {"api_key": "<token>", ...}
                      Only used when AuthInject=body
                    type: string
                  authInject:
                    default: header
                    description: |-
                      AuthInject specifies where to inject the auth token: "header" (default) or "body"
                      When "header", the token is added as Authorization: Bearer <token>
                      When "body", the token is added to the JSON request body using AuthBodyKey
                    enum:
                    - header
                    - body
                    type: string
                  authSecretRef:
                    description: |-
                      AuthSecretRef references a Secret containing authentication token
                      Token is injected as Authorization: Bearer <token> (when AuthInject=header)
                      or into the request body (when AuthInject=body)
                    properties:
                      key:
                        description: Key is the key within the Secret
                        type: string
                      name:
                        description: Name is the name of the Secret
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  headers:
                    additionalProperties:
                      type: string
                    description: Headers are additional headers to include in requests
                    type: object
                  method:
                    default: POST
                    description: 'Method is the HTTP method to use (default: POST)'
                    enum:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - DELETE
                    type: string
                  timeout:
                    description: 'Timeout is the request timeout (default: 30s)'
                    type: string
                  url:
                    description: |-
                      URL is the endpoint to call when the tool is invoked
                      Required for plain HTTP tools. MCP actor-backed tools may omit it when
                      HTTP is present only for transport auth settings.
                    type: string
                type: object
              mcp:
                description: |-
                  MCP defines a durable MCP server backend for this tool. MCP tools must set
                  substrateActor.
                properties:
                  path:
                    description: |-
                      Path is the HTTP path exposed by the MCP server inside the actor.
                      Defaults to /mcp.
                    type: string
                  substrateActor:
                    description: SubstrateActor configures a durable Substrate actor
                      that hosts the MCP server.
                    properties:
                      boot:
                        description: Boot asks Substrate to boot this actor from scratch
                          on first resume.
                        type: boolean
                      poolRef:
                        description: PoolRef optionally assigns this tool actor to
                          an Orka SubstrateActorPool.
                        properties:
                          name:
                            description: Name is the pool name.
                            type: string
                          namespace:
                            description: Namespace is the pool namespace. It defaults
                              to the Task namespace.
                            type: string
                        type: object
                      templateRef:
                        description: TemplateRef references the ActorTemplate that
                          runs the MCP server.
                        properties:
                          name:
                            description: Name is the name of the workspace template.
                            type: string
                          namespace:
                            description: |-
                              Namespace is the namespace of the workspace template and claim.
                              It defaults to the Task namespace, or the controller namespace when configured.
                            type: string
                        type: object
                    required:
                    - templateRef
                    type: object
                required:
                - substrateActor
                type: object
              parameters:
                description: Parameters is the JSON Schema for tool parameters (OpenAI
                  function calling format)
                x-kubernetes-preserve-unknown-fields: true
            required:
            - description
            type: object
            x-kubernetes-validations:
            - message: http or mcp.substrateActor is required
              rule: has(self.http) || (has(self.mcp) && has(self.mcp.substrateActor))
            - message: http.url is required unless mcp.substrateActor is set
              rule: '!has(self.http) || (has(self.mcp) && has(self.mcp.substrateActor))
                || (has(self.http.url) && self.http.url.size() > 0)'
          status:
            description: ToolStatus defines the observed state of Tool
            properties:
              actor:
                description: Actor reports durable actor metadata when this tool is
                  MCP actor-backed.
                properties:
                  actorID:
                    description: ActorID is the stable provider actor id.
                    type: string
                  poolRef:
                    description: PoolRef is the resolved Orka actor pool.
                    properties:
                      name:
                        description: Name is the pool name.
                        type: string
                      namespace:
                        description: Namespace is the pool namespace. It defaults
                          to the Task namespace.
                        type: string
                    type: object
                  provider:
                    description: Provider is the actor provider.
                    enum:
                    - agent-sandbox
                    - substrate
                    type: string
                  routeHost:
                    description: RouteHost is the HTTP Host value used with the provider
                      router.
                    type: string
                  templateRef:
                    description: TemplateRef is the resolved actor template.
                    properties:
                      name:
                        description: Name is the name of the workspace template.
                        type: string
                      namespace:
                        description: |-
                          Namespace is the namespace of the workspace template and claim.
                          It defaults to the Task namespace, or the controller namespace when configured.
                        type: string
                    type: object
                type: object
              available:
                description: Available indicates whether the tool endpoint is reachable
                type: boolean
              conditions:
                description: Conditions represent the current state of the Tool
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoint:
                description: Endpoint is the resolved non-secret endpoint used by
                  workers.
                type: string
              error:
                description: Error is the error message if the tool is unavailable
                type: string
              lastCheck:
                description: LastCheck is the timestamp of the last health check
                format: date-time
                type: string
            required:
            - available
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
