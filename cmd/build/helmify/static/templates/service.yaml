apiVersion: v1
kind: Service
metadata:
  name: {{ include "orka.fullname" . }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
      name: api
    - port: {{ .Values.controller.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "orka.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
