{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mercan.serviceAccountName" . }}
  labels:
    {{- include "mercan.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.client.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.client.name }}
  labels:
    {{- include "mercan.labels" . | nindent 4 }}
    mercan.ai/client: "true"
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mercan-worker
  labels:
    {{- include "mercan.labels" . | nindent 4 }}
    mercan.ai/worker: "true"
