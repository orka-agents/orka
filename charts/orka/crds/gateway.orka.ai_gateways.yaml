---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: gateways.gateway.orka.ai
spec:
  group: gateway.orka.ai
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    shortNames:
    - gw
    singular: gateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.gatewayClassName
      name: Class
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.connected
      name: Connected
      type: boolean
    - jsonPath: .status.resolvedEndpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Gateway configures one provider-neutral adapter instance.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GatewaySpec defines one configured adapter instance.
            properties:
              adapter:
                description: Adapter selects an HTTPS endpoint or TLS-authenticated
                  same-namespace Service.
                properties:
                  endpoint:
                    description: Endpoint is an absolute HTTPS adapter base URL.
                    pattern: ^https://[^\s@?#]+$
                    type: string
                  serviceRef:
                    description: ServiceRef selects a selector-backed TLS Service
                      in the Gateway namespace.
                    properties:
                      name:
                        description: Name is the Service name in the Gateway namespace.
                        minLength: 1
                        type: string
                      port:
                        description: Port is the Service port. Zero selects the first
                          declared Service port.
                        format: int32
                        maximum: 65535
                        minimum: 0
                        type: integer
                    required:
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of endpoint or serviceRef is required
                  rule: has(self.endpoint) != has(self.serviceRef)
              gatewayClassName:
                description: GatewayClassName references a cluster-scoped GatewayClass.
                minLength: 1
                type: string
              inboundAuthRef:
                description: InboundAuthRef authenticates adapter calls into Orka.
                properties:
                  key:
                    description: Key is the Secret data key.
                    minLength: 1
                    type: string
                  name:
                    description: Name is the Secret name.
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
              metadata:
                additionalProperties:
                  type: string
                description: Metadata is bounded, non-secret operator metadata.
                maxProperties: 32
                type: object
              outboundAuthRef:
                description: OutboundAuthRef authenticates Orka calls to the adapter.
                properties:
                  key:
                    description: Key is the Secret data key.
                    minLength: 1
                    type: string
                  name:
                    description: Name is the Secret name.
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
            required:
            - adapter
            - gatewayClassName
            - inboundAuthRef
            - outboundAuthRef
            type: object
            x-kubernetes-validations:
            - message: inbound and outbound authentication must use separate Secrets
              rule: self.inboundAuthRef.name != self.outboundAuthRef.name
          status:
            description: GatewayStatus reports reference resolution and adapter connectivity.
            properties:
              accepted:
                description: Accepted reports spec validation.
                type: boolean
              conditions:
                description: Conditions report Accepted, ResolvedRefs, Connected,
                  and Ready state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connected:
                description: Connected reports a successful authenticated adapter
                  probe.
                type: boolean
              lastSuccessfulProbe:
                description: LastSuccessfulProbe is the last successful health/capability
                  probe.
                format: date-time
                type: string
              message:
                description: Message is sanitized readiness context.
                type: string
              observedCapabilities:
                description: ObservedCapabilities is the sanitized adapter capability
                  response.
                properties:
                  adapterName:
                    description: AdapterName is the sanitized adapter name.
                    type: string
                  adapterVersion:
                    description: AdapterVersion is the sanitized adapter version.
                    type: string
                  capabilities:
                    description: Capabilities are provider-neutral observed behaviors.
                    properties:
                      explicitSessions:
                        description: ExplicitSessions indicates that explicit Session
                          names are supported by bindings.
                        type: boolean
                      idempotentDelivery:
                        description: IdempotentDelivery indicates that repeated delivery
                          IDs do not create duplicate provider sends.
                        type: boolean
                      inboundText:
                        description: InboundText indicates support for authenticated
                          inbound text events.
                        type: boolean
                      outboundText:
                        description: OutboundText indicates support for final text
                          and sanitized error delivery.
                        type: boolean
                      senderIdentity:
                        description: SenderIdentity indicates that stable sender identity
                          is preserved.
                        type: boolean
                      threads:
                        description: Threads indicates that thread identity is preserved.
                        type: boolean
                    type: object
                  contractVersion:
                    description: ContractVersion is the protocol reported by the adapter.
                    type: string
                type: object
              observedGeneration:
                description: ObservedGeneration is the latest reconciled generation.
                format: int64
                type: integer
              observedInboundAuthSecretVersion:
                description: ObservedInboundAuthRefVersion is non-secret Secret resource
                  metadata.
                type: string
              observedOutboundAuthSecretVersion:
                description: ObservedOutboundAuthRefVersion is non-secret Secret resource
                  metadata.
                type: string
              ready:
                description: Ready reports that ingress and delivery may use this
                  Gateway.
                type: boolean
              resolvedEndpoint:
                description: ResolvedEndpoint is a sanitized scheme and host suitable
                  for operators.
                type: string
              resolvedRefs:
                description: ResolvedRefs reports class, Service, and Secret resolution.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
