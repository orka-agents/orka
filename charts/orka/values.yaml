# Orka Helm Chart Values

# Controller configuration
controller:
  # Number of controller replicas
  replicas: 1

  # Controller image
  image:
    repository: ghcr.io/sozercan/orka
    tag: latest
    pullPolicy: IfNotPresent

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Watch namespace (empty for cluster-scoped)
  watchNamespace: ""

  # API server port
  apiPort: 8080

  # Metrics port
  metricsPort: 8081

  # Health probe port
  healthPort: 8082

  # Enable leader election for HA
  leaderElect: true

  # Log level (debug, info, warn, error)
  logLevel: info

  # Enforce namespace isolation (restrict users to their SA namespace)
  enforceNamespaceIsolation: false

  # Max active tasks per namespace (0 = unlimited)
  maxTasksPerNamespace: 0

  # Experimental agent sandbox workspace support (disabled by default)
  executionWorkspace:
    # Default provider used when Task execution.workspace.provider is omitted.
    defaultProvider: agent-sandbox

  agentSandbox:
    # Enables workspace-backed execution for agent Tasks that set Task execution.workspace.
    enabled: false
    # Optional upstream agent-sandbox router base URL used for workspace claims.
    routerUrl: ""
    # Optional default execution workspace template name used when a Task omits execution.workspace.templateRef.name.
    defaultTemplate: ""
    # Warm pool policy: disabled, template.
    warmPoolPolicy: disabled
    # Namespace strategy: task, controller.
    namespaceStrategy: task
    # Timeout for workspace claim and readiness operations.
    claimTimeout: 2m
    # Timeout for agent runtime execution inside the sandbox.
    commandTimeout: 30m
    # Default cleanup policy: delete, retain.
    cleanupPolicy: delete

  # Experimental Substrate execution workspace support (disabled by default)
  substrate:
    enabled: false
    apiEndpoint: api.ate-system.svc:443
    apiCAFile: ""
    apiInsecureSkipVerify: false
    routerUrl: http://atenet-router.ate-system.svc
    actorDnsSuffix: actors.resources.substrate.ate.dev
    defaultTemplate: ""
    defaultTemplateNamespace: ""
    claimTimeout: 2m
    commandTimeout: 30m
    cleanupPolicy: delete

  # OIDC/JWT authentication for external API requests
  oidc:
    # Issuer URL expected in bearer tokens. Requires audience when set.
    issuer: ""
    # Audience expected in bearer tokens. Requires issuer when set.
    audience: ""
    # Optional JWKS URL. When empty, Orka discovers it from issuer.
    jwksUrl: ""

  # Context-token authentication, scoped authorization, and optional kontxt TTS exchange.
  # Empty values keep the controller defaults / corresponding environment variables.
  contextToken:
    # Profile for external context tokens (supported: kontxt).
    profile: ""
    # Issuer URL expected in context tokens. Requires profile and audience when set.
    issuer: ""
    # Audience expected in context tokens. Requires profile and issuer when set.
    audience: ""
    # Optional JWKS URL. For kontxt, defaults to <issuer>/.well-known/jwks.json.
    jwksUrl: ""
    # Comma-separated token headers, e.g. Txn-Token or Txn-Token,Authorization:Bearer.
    headers: ""
    # Authorization mode: off, audit, or enforce. Empty defaults to off.
    authzMode: ""
    scopes:
      taskCreate: ""
      taskRead: ""
      taskList: ""
      taskDelete: ""
      toolRead: ""
      toolUse: ""
      providerUse: ""
      secretRead: ""
      agentRead: ""
      agentWrite: ""
      memoryRead: ""
      memoryWrite: ""
      sessionRead: ""
      sessionWrite: ""
      securityRead: ""
      securityWrite: ""
      skillRead: ""
      skillWrite: ""
    tts:
      # kontxt TTS base URL for child/outbound token exchange.
      url: ""
      # Optional exchange audience.
      audience: ""
      # Exchange timeout, e.g. 5s.
      timeout: ""
      # Subject token source: serviceAccount, incoming, or none.
      tokenSource: ""
      # Worker-side subject token type.
      subjectTokenType: ""
      # Requested scope for child delegated TxTokens.
      childScope: ""
      # Requested scope for outbound HTTP Tool TxTokens.
      outboundScope: ""
      # Requested TTLs, e.g. 5m and 2m.
      childTokenTTL: ""
      toolTokenTTL: ""

# Worker configuration
workers:
  ai:
    image:
      repository: ghcr.io/sozercan/orka/ai-worker
      tag: latest
      pullPolicy: IfNotPresent

  copilot:
    image:
      repository: ghcr.io/sozercan/orka/agent-worker-copilot
      tag: latest
      pullPolicy: IfNotPresent

  claude:
    image:
      repository: ghcr.io/sozercan/orka/agent-worker-claude
      tag: latest
      pullPolicy: IfNotPresent

  codex:
    image:
      repository: ghcr.io/sozercan/orka/agent-worker-codex
      tag: latest
      pullPolicy: IfNotPresent
    # Optional Codex CLI sandbox mode passed to Codex worker pods (e.g. danger-full-access)
    sandboxMode: ""

# Service configuration
service:
  type: ClusterIP
  port: 8080

# ServiceAccount configuration
serviceAccount:
  # Create the service account
  create: true
  # Name of the service account (auto-generated if not set)
  name: ""
  # Annotations to add to the service account
  annotations: {}

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# CRD configuration
crds:
  # Install CRDs
  install: true
  # Keep CRDs on chart uninstall
  keep: true

# Security context for pods
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

# Security context for containers
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Additional labels
labels: {}

# Additional annotations
annotations: {}

# SQLite store configuration
store:
  path: /data/orka.db
  persistence:
    enabled: false       # default: ephemeral (emptyDir), no PVC
    size: 1Gi            # only when enabled: true
    storageClass: ""     # use cluster default
    accessMode: ReadWriteOnce

# Client ServiceAccount for API access
client:
  # Create a client service account
  create: true
  # Name of the client service account
  name: orka-client
