# Orka Helm Chart Values

# Controller configuration
controller:
  # Number of controller replicas
  replicas: 1

  # Controller image
  image:
    repository: ghcr.io/sozercan/orka
    tag: latest
    pullPolicy: IfNotPresent

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Watch namespace (empty for cluster-scoped)
  watchNamespace: ""

  # API server port
  apiPort: 8080

  # Metrics port
  metricsPort: 8081

  # Health probe port
  healthPort: 8082

  # Enable leader election for HA
  leaderElect: true

  # Log level (debug, info, warn, error)
  logLevel: info

  # Enforce namespace isolation (restrict users to their SA namespace)
  enforceNamespaceIsolation: false

  # Max active tasks per namespace (0 = unlimited)
  maxTasksPerNamespace: 0

# Worker configuration
workers:
  ai:
    image:
      repository: ghcr.io/sozercan/orka/ai-worker
      tag: latest
      pullPolicy: IfNotPresent

  copilot:
    image:
      repository: ghcr.io/sozercan/orka/agent-worker-copilot
      tag: latest
      pullPolicy: IfNotPresent

  claude:
    image:
      repository: ghcr.io/sozercan/orka/agent-worker-claude
      tag: latest
      pullPolicy: IfNotPresent

  codex:
    image:
      repository: ghcr.io/sozercan/orka/agent-worker-codex
      tag: latest
      pullPolicy: IfNotPresent
    # Optional Codex CLI sandbox mode passed to Codex worker pods (e.g. danger-full-access)
    sandboxMode: ""

# GitHub webhook and label-trigger configuration.
# Configure a repository webhook to POST to /webhooks/github with the secret below.
github:
  webhook:
    # Kubernetes Secret containing the GitHub webhook shared secret.
    secretName: ""
    secretKey: secret
  labelTrigger:
    # Default runtime Agent CR used for labels such as agent:implement.
    agent: ""
    # Optional namespace for created Tasks; defaults to controller.watchNamespace or default.
    namespace: ""
    # Optional Secret name mounted into agent workspaces for git/GitHub auth.
    gitSecret: ""
    # Label prefix that marks an Orka trigger.
    prefix: "agent:"
    timeout: "30m"
    maxTurns: 100
    # Optional action-specific Agent overrides, e.g. implement: codex-agent.
    agents: {}

# Service configuration
service:
  type: ClusterIP
  port: 8080

# ServiceAccount configuration
serviceAccount:
  # Create the service account
  create: true
  # Name of the service account (auto-generated if not set)
  name: ""
  # Annotations to add to the service account
  annotations: {}

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# CRD configuration
crds:
  # Install CRDs
  install: true
  # Keep CRDs on chart uninstall
  keep: true

# Security context for pods
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

# Security context for containers
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Additional labels
labels: {}

# Additional annotations
annotations: {}

# SQLite store configuration
store:
  path: /data/orka.db
  persistence:
    enabled: false       # default: ephemeral (emptyDir), no PVC
    size: 1Gi            # only when enabled: true
    storageClass: ""     # use cluster default
    accessMode: ReadWriteOnce

# Client ServiceAccount for API access
client:
  # Create a client service account
  create: true
  # Name of the client service account
  name: orka-client
