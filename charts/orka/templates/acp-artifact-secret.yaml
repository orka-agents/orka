{{- if not .Values.controller.acpArtifact.existingSecret }}
{{- $secretName := printf "%s-acp-artifact-capability" (include "orka.fullname" .) }}
{{- $secretKey := .Values.controller.acpArtifact.secretKey | default "capability-secret" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingValue := "" }}
{{- if and $existing (hasKey $existing.data $secretKey) }}
{{- $existingValue = (index $existing.data $secretKey | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    app.kubernetes.io/component: acp-artifact-api
type: Opaque
stringData:
  {{ $secretKey }}: {{ default (default (randAlphaNum 64) $existingValue) .Values.controller.acpArtifact.secret | quote }}
{{- end }}
