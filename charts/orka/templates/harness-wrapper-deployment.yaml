apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orka.fullname" . }}-agent-harness-wrapper
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-harness-wrapper
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "orka.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-harness-wrapper
  template:
    metadata:
      labels:
        {{- include "orka.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-harness-wrapper
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wrapper
          image: {{ .Values.workers.harnessWrapper.image.repository }}:{{ .Values.workers.harnessWrapper.image.tag }}
          imagePullPolicy: {{ .Values.workers.harnessWrapper.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ORKA_HARNESS_WRAPPER_RUNTIME
              value: multi
            - name: ORKA_HARNESS_WRAPPER_LISTEN_ADDR
              value: :8080
            - name: ORKA_HARNESS_WRAPPER_BEARER_TOKEN_FILE
              value: /var/run/orka/harness-wrapper/token
            - name: ORKA_ALLOW_BASH
              value: "true"
          volumeMounts:
            - name: auth
              mountPath: /var/run/orka/harness-wrapper
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: workspace
              mountPath: /workspace
            - name: home
              mountPath: /home/worker
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.workers.harnessWrapper.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: auth
          secret:
            secretName: {{ .Values.workers.harnessWrapper.auth.existingSecret | default (printf "%s-harness-wrapper-auth" (include "orka.fullname" .)) }}
        - name: tmp
          emptyDir: {}
        - name: workspace
          emptyDir: {}
        - name: home
          emptyDir: {}
