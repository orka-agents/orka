apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orka.fullname" . }}-agent-harness-wrapper
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-harness-wrapper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "orka.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-harness-wrapper
  template:
    metadata:
      labels:
        {{- include "orka.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-harness-wrapper
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wrapper
          image: {{ .Values.workers.harnessWrapper.image.repository }}:{{ .Values.workers.harnessWrapper.image.tag }}
          imagePullPolicy: {{ .Values.workers.harnessWrapper.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ORKA_HARNESS_WRAPPER_RUNTIME
              value: multi
            - name: ORKA_HARNESS_WRAPPER_LISTEN_ADDR
              value: :8080
            - name: ORKA_HARNESS_WRAPPER_BEARER_TOKEN_FILE
              value: /var/run/orka/harness-wrapper/token
            - name: ORKA_ALLOW_BASH
              value: "true"
            - name: ORKA_HARNESS_WRAPPER_CHILD_UID
              value: "1000"
            - name: ORKA_HARNESS_WRAPPER_CHILD_GID
              value: "1000"
            {{- if .Values.workers.harnessWrapper.codexSandboxMode }}
            - name: ORKA_CODEX_SANDBOX_MODE
              value: {{ .Values.workers.harnessWrapper.codexSandboxMode | quote }}
            {{- end }}
          volumeMounts:
            - name: auth
              mountPath: /var/run/orka/harness-wrapper
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.workers.harnessWrapper.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: auth
          secret:
            secretName: {{ .Values.workers.harnessWrapper.auth.existingSecret | default (printf "%s-harness-wrapper-auth" (include "orka.fullname" .)) }}
            defaultMode: 0400
            items:
              - key: {{ .Values.workers.harnessWrapper.auth.tokenKey | default "token" }}
                path: token
        - name: tmp
          emptyDir: {}
