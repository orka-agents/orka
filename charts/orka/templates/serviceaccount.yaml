{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orka.serviceAccountName" . }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.client.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.client.name }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    orka.ai/client: "true"
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orka-worker
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    orka.ai/worker: "true"
