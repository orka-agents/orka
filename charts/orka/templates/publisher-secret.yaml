{{- if and .Values.publisher.enabled (not .Values.publisher.auth.existingSecret) }}
{{- $name := printf "%s-workspace-publisher-auth" (include "orka.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $controllerKey := .Values.publisher.auth.controllerTokenKey | default "controller-token" }}
{{- $capabilityKey := .Values.publisher.auth.capabilitySecretKey | default "operation-capability-secret" }}
{{- $existingController := "" }}
{{- $existingCapability := "" }}
{{- if $existing }}
{{- if hasKey $existing.data $controllerKey }}{{- $existingController = (index $existing.data $controllerKey | b64dec) }}{{- end }}
{{- if hasKey $existing.data $capabilityKey }}{{- $existingCapability = (index $existing.data $capabilityKey | b64dec) }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace-publisher
type: Opaque
stringData:
  {{ $controllerKey }}: {{ default (default (randAlphaNum 64) $existingController) .Values.publisher.auth.controllerToken | quote }}
  {{ $capabilityKey }}: {{ default (default (randAlphaNum 64) $existingCapability) .Values.publisher.auth.capabilitySecret | quote }}
{{- end }}
