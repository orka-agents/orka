{{- if not .Values.workers.harnessWrapper.auth.existingSecret }}
{{- $secretName := printf "%s-harness-wrapper-auth" (include "orka.fullname" .) }}
{{- $tokenKey := .Values.workers.harnessWrapper.auth.tokenKey | default "token" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingToken := "" }}
{{- if and $existing (hasKey $existing.data $tokenKey) }}
{{- $existingToken = (index $existing.data $tokenKey | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-harness-wrapper
type: Opaque
stringData:
  {{ $tokenKey }}: {{ default (default (randAlphaNum 32) $existingToken) .Values.workers.harnessWrapper.auth.token | quote }}
{{- end }}
