{{- if .Values.rbac.create -}}
# Controller ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "orka.fullname" . }}-controller
  labels:
    {{- include "orka.labels" . | nindent 4 }}
rules:
  # Custom Resource permissions
  - apiGroups: ["core.orka.ai"]
    resources: ["tasks", "tools", "agents", "providers", "skills", "repositoryscans"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["core.orka.ai"]
    resources: ["tasks/status", "tools/status", "agents/status", "providers/status", "skills/status", "repositoryscans/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.orka.ai"]
    resources: ["tasks/finalizers", "tools/finalizers", "agents/finalizers", "providers/finalizers", "skills/finalizers", "repositoryscans/finalizers"]
    verbs: ["update"]

  # Job permissions
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]

  # Core resource permissions
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims", "replicationcontrollers"]
    verbs: ["get", "list", "watch"]

  # Workload resource permissions (read-only, for chat K8s tools)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Agent sandbox workspace backend: create/reattach/delete claims and connect to sandbox pods
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxtemplates", "sandboxwarmpools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

  # RBAC permissions (for chat K8s tools and managed worker bindings)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "roles", "rolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # TokenReview for authentication
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Controller ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "orka.fullname" . }}-controller
  labels:
    {{- include "orka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "orka.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "orka.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Client ClusterRole (for API access)
{{- if .Values.client.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "orka.fullname" . }}-client
  labels:
    {{- include "orka.labels" . | nindent 4 }}
rules:
  # Task permissions
  - apiGroups: ["core.orka.ai"]
    resources: ["tasks"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["core.orka.ai"]
    resources: ["tasks/status"]
    verbs: ["get"]

  # Tool permissions (read-only)
  - apiGroups: ["core.orka.ai"]
    resources: ["tools"]
    verbs: ["get", "list", "watch"]

  # Agent permissions (read-only)
  - apiGroups: ["core.orka.ai"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]

  # Skill permissions (read-only)
  - apiGroups: ["core.orka.ai"]
    resources: ["skills"]
    verbs: ["get", "list", "watch"]

  # ConfigMap permissions (for results and sessions)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "orka.fullname" . }}-client
  labels:
    {{- include "orka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "orka.fullname" . }}-client
subjects:
  - kind: ServiceAccount
    name: {{ .Values.client.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
