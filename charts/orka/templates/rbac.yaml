---
# Container Worker Role (minimal worker for container tasks)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "orka.containerWorkerClusterRoleName" . }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
rules:
  # Minimal Task metadata for Orka-managed general-worker tasks, which submit
  # results/artifacts through the controller HTTP API using the worker ServiceAccount
  # token. Custom-image container tasks do not mount this token and have their
  # result collected from pod logs instead.
  - apiGroups: ["core.orka.ai"]
    resources: ["tasks"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "orka.containerWorkerClusterRoleBindingName" . }}
  labels:
    {{- include "orka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "orka.containerWorkerClusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: orka-container-worker
    namespace: {{ .Release.Namespace }}
{{- end }}
