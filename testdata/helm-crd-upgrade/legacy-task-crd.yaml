# Pinned legacy Task CRD fixture for Helm CRD migration testing.
# Keep this independent from charts/orka/crds so incompatible non-schema changes
# fail the upgrade test instead of being copied silently from the target chart.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.core.orka.ai
spec:
  group: core.orka.ai
  names:
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - jsonPath: .spec.type
          name: Type
          type: string
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .spec.priority
          name: Priority
          type: integer
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          properties:
            legacyOnly:
              type: string
            spec:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - legacy-only
