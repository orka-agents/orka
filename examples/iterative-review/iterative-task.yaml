apiVersion: core.orka.ai/v1alpha1
kind: Task
metadata:
  name: deliver-auth-feature
spec:
  type: ai
  agentRef:
    name: coordinator
  prompt: |
    Implement JWT authentication for the API.

    Repository details for delegated agent tasks:
    - gitRepo: https://github.com/example/api.git
    - branch: main
    - gitSecretRef: git-credentials
    - pushBranch: feature/jwt-auth

    Requirements:
    - Login endpoint with username/password
    - Token refresh endpoint
    - Middleware for protected routes
    - Unit tests for all endpoints
  timeout: 1h
