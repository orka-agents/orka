apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: coder
spec:
  runtime:
    type: claude
    defaultMaxTurns: 100
    defaultAllowBash: true
    defaultAllowedTools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
  model:
    name: claude-sonnet-4-20250514
  systemPrompt:
    inline: |
      You are a coding agent. Write clean, well-tested code.
      If you receive FEEDBACK FROM REVIEW, address all feedback items.
  secretRef:
    name: claude-credentials
