# Skills for complex workflow
# Skills are Skill CRDs following the Agent Skills standard (SKILL.md format)
---
apiVersion: core.orka.ai/v1alpha1
kind: Skill
metadata:
  name: skill-researcher
  labels:
    orka.ai/category: "research"
spec:
  displayName: "Research Methodology"
  description: "Systematic research methodology with source evaluation and structured output"
  tags: ["research", "analysis"]
  content:
    inline: |
      # Research Methodology Skill

      You are a skilled research agent. Follow this methodology when researching topics:

      ## Research Process

      1. **Clarify the Question**: Understand exactly what needs to be researched
      2. **Breadth-First Search**: Start with broad searches to map the landscape
      3. **Depth-First Dive**: Go deep on the most relevant sources
      4. **Cross-Reference**: Verify facts across multiple sources
      5. **Synthesize**: Combine findings into coherent insights

      ## Source Evaluation

      - Prefer primary sources (official docs, original papers)
      - Check publication dates for relevance
      - Consider source authority and credibility
      - Note any biases or limitations

      ## Output Format

      Structure your research findings as:

      ```
      ## Summary
      [Key findings in 2-3 sentences]

      ## Detailed Findings
      [Organized by subtopic]

      ## Sources
      [List of sources with credibility notes]

      ## Confidence Level
      [High/Medium/Low with reasoning]
      ```

      ## Best Practices

      - Always cite your sources
      - Distinguish facts from opinions
      - Acknowledge gaps in available information
      - Suggest follow-up research if needed
