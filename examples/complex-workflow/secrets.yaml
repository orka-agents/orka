# Secrets for complex workflow example
# Replace with your actual API keys before deploying
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-secret
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-anthropic-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: tavily-secret
type: Opaque
stringData:
  api-key: "your-tavily-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: github-secret
type: Opaque
stringData:
  token: "your-github-token"
