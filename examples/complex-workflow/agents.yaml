# Agents for complex workflow
# Demonstrates multi-agent coordination similar to OpenClaw patterns
#
# Prerequisites:
# - A Provider CRD must be configured (e.g., "anthropic-prod")
# - Update providerRef.name below to match your provider
---
# Researcher Agent - specializes in finding information
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: researcher-agent
  labels:
    orka.ai/role: specialist
    orka.ai/specialty: research
spec:
  # Use provider for model and credentials
  providerRef:
    name: anthropic-prod  # Change to your provider name
  model:
    temperature: 0.3  # Lower temperature for factual research
    maxTokens: 4096
  systemPrompt:
    inline: |
      You are a research specialist agent. Your role is to find, analyze, and synthesize information.

      You have access to web search and GitHub tools. Use them effectively to:
      - Find relevant documentation and resources
      - Analyze existing solutions and patterns
      - Gather technical details and specifications

      Always provide well-sourced, accurate information.
  tools:
    - name: tavily-search
    - name: github-search-repos
    - name: github-get-repo
    - name: github-get-readme
  skills:
    - name: skill-researcher
  session:
    persistence: configmap
    maxMessages: 30
---
# Coder Agent - specializes in writing and modifying code
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: coder-agent
  labels:
    orka.ai/role: specialist
    orka.ai/specialty: coding
spec:
  providerRef:
    name: anthropic-prod  # Change to your provider name
  model:
    temperature: 0.2  # Low temperature for precise code generation
    maxTokens: 8192
  systemPrompt:
    inline: |
      You are a coding specialist agent. Your role is to write clean, efficient, and well-tested code.

      Guidelines:
      - Write idiomatic code following language best practices
      - Include appropriate error handling
      - Add comments only where necessary (complex logic)
      - Consider security implications
      - Provide tests when applicable

      When given a coding task, first understand the requirements, then implement a solution.
  tools:
    - name: github-search-repos
    - name: github-get-readme
  skills:
    - name: skill-architect
  session:
    persistence: configmap
    maxMessages: 50
---
# Reviewer Agent - specializes in code review and quality
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: reviewer-agent
  labels:
    orka.ai/role: specialist
    orka.ai/specialty: review
spec:
  providerRef:
    name: anthropic-prod  # Change to your provider name
  model:
    temperature: 0.4
    maxTokens: 4096
  systemPrompt:
    inline: |
      You are a code review specialist agent. Your role is to analyze code for:
      - Correctness and potential bugs
      - Security vulnerabilities
      - Performance issues
      - Maintainability and readability
      - Best practices adherence

      Provide constructive, actionable feedback. Be thorough but fair.
  tools:
    - name: github-list-issues
  skills:
    - name: skill-code-review
  session:
    persistence: configmap
    maxMessages: 30
---
# Coordinator Agent - orchestrates multi-agent workflows
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: coordinator-agent
  labels:
    orka.ai/role: coordinator
spec:
  providerRef:
    name: anthropic-prod  # Change to your provider name
  model:
    temperature: 0.5
    maxTokens: 4096
  systemPrompt:
    inline: |
      You are a coordinator agent responsible for orchestrating complex tasks.

      You can delegate work to specialist agents:
      - researcher-agent: For research, finding information, analyzing existing solutions
      - coder-agent: For writing and implementing code
      - reviewer-agent: For code review and quality analysis

      Your job is to:
      1. Analyze incoming requests
      2. Break them into subtasks
      3. Delegate to appropriate specialists
      4. Synthesize results into a coherent response

      Think step-by-step about how to accomplish complex goals.
  tools:
    - name: tavily-search
    - name: github-search-repos
  skills:
    - name: skill-coordinator
  session:
    persistence: configmap
    maxMessages: 100
  coordination:
    enabled: true
    allowedAgents:
      - name: researcher-agent
      - name: coder-agent
      - name: reviewer-agent
    maxConcurrentChildren: 3
    maxDepth: 2
