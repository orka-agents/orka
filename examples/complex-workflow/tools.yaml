# Custom Tools for complex workflow
# These tools enable agents to interact with external services
---
apiVersion: core.mercan.ai/v1alpha1
kind: Tool
metadata:
  name: tavily-search
spec:
  description: |
    Search the web for current information using Tavily.
    Use this when you need to find up-to-date information, news, documentation, or facts from the internet.
    Returns search results with titles, URLs, and content snippets.
  parameters:
    type: object
    properties:
      query:
        type: string
        description: "The search query to execute"
      max_results:
        type: integer
        description: "Maximum number of results to return (default: 5)"
        default: 5
      search_depth:
        type: string
        description: "Search depth: 'basic' for quick results, 'advanced' for comprehensive search"
        enum: ["basic", "advanced"]
        default: "basic"
      include_answer:
        type: boolean
        description: "Include a generated answer based on search results"
        default: true
      include_domains:
        type: array
        items:
          type: string
        description: "Limit search to these domains (e.g., ['github.com', 'docs.python.org'])"
    required: ["query"]
  http:
    url: "https://api.tavily.com/search"
    method: POST
    headers:
      Content-Type: application/json
    timeout: 30s
    authSecretRef:
      name: tavily-secret
      key: api-key
    authInject: body
    authBodyKey: api_key
---
apiVersion: core.mercan.ai/v1alpha1
kind: Tool
metadata:
  name: github-search-repos
spec:
  description: |
    Search GitHub repositories by keywords, language, stars, or topics.
    Use this to find relevant open-source projects, libraries, or examples.
  parameters:
    type: object
    properties:
      q:
        type: string
        description: "Search query (supports GitHub search syntax: 'language:go stars:>1000')"
      sort:
        type: string
        description: "Sort results by: stars, forks, help-wanted-issues, updated"
        enum: ["stars", "forks", "help-wanted-issues", "updated"]
      order:
        type: string
        description: "Sort order: asc or desc"
        enum: ["asc", "desc"]
        default: "desc"
      per_page:
        type: integer
        description: "Results per page (max 100)"
        default: 10
    required: ["q"]
  http:
    url: "https://api.github.com/search/repositories"
    method: GET
    headers:
      Accept: application/vnd.github+json
      X-GitHub-Api-Version: "2022-11-28"
    timeout: 30s
    authSecretRef:
      name: github-secret
      key: token
    authInject: header
---
apiVersion: core.mercan.ai/v1alpha1
kind: Tool
metadata:
  name: github-get-repo
spec:
  description: |
    Get detailed information about a specific GitHub repository.
    Returns repo description, stars, forks, language, topics, and recent activity.
  parameters:
    type: object
    properties:
      owner:
        type: string
        description: "Repository owner (user or organization)"
      repo:
        type: string
        description: "Repository name"
    required: ["owner", "repo"]
  http:
    url: "https://api.github.com/repos/{owner}/{repo}"
    method: GET
    headers:
      Accept: application/vnd.github+json
      X-GitHub-Api-Version: "2022-11-28"
    timeout: 30s
    authSecretRef:
      name: github-secret
      key: token
    authInject: header
---
apiVersion: core.mercan.ai/v1alpha1
kind: Tool
metadata:
  name: github-list-issues
spec:
  description: |
    List issues in a GitHub repository. Useful for finding bugs, feature requests, or discussions.
  parameters:
    type: object
    properties:
      owner:
        type: string
        description: "Repository owner"
      repo:
        type: string
        description: "Repository name"
      state:
        type: string
        description: "Filter by state: open, closed, all"
        enum: ["open", "closed", "all"]
        default: "open"
      labels:
        type: string
        description: "Comma-separated list of label names (e.g., 'bug,help wanted')"
      per_page:
        type: integer
        description: "Results per page (max 100)"
        default: 10
    required: ["owner", "repo"]
  http:
    url: "https://api.github.com/repos/{owner}/{repo}/issues"
    method: GET
    headers:
      Accept: application/vnd.github+json
      X-GitHub-Api-Version: "2022-11-28"
    timeout: 30s
    authSecretRef:
      name: github-secret
      key: token
    authInject: header
---
apiVersion: core.mercan.ai/v1alpha1
kind: Tool
metadata:
  name: github-get-readme
spec:
  description: |
    Get the README content of a GitHub repository.
    Returns the decoded markdown content of the repository's README file.
  parameters:
    type: object
    properties:
      owner:
        type: string
        description: "Repository owner"
      repo:
        type: string
        description: "Repository name"
    required: ["owner", "repo"]
  http:
    url: "https://api.github.com/repos/{owner}/{repo}/readme"
    method: GET
    headers:
      Accept: application/vnd.github.raw+json
      X-GitHub-Api-Version: "2022-11-28"
    timeout: 30s
    authSecretRef:
      name: github-secret
      key: token
    authInject: header
