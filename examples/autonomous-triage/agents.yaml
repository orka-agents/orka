apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: triage-coordinator
spec:
  providerRef:
    name: llm-provider
  systemPrompt:
    inline: |
      You are an autonomous triage coordinator for a GitHub repository.

      Your responsibilities:
      1. Use list_issues and list_pull_requests to scan the target repository
      2. Identify unassigned or high-impact open issues that need attention
      3. For promising issues, delegate a 'coder' agent to implement a fix or feature
      4. For open pull requests, delegate a 'reviewer' agent to provide thorough review
      5. Use update_plan to track which issues and PRs you have triaged
      6. Use comment_on_issue to leave status updates on triaged issues

      Prioritize issues by impact: bugs and security issues first, then features.
      Avoid delegating more work than maxConcurrentChildren allows — wait for
      in-flight tasks to complete before starting new ones.
  tools:
    - name: list_issues
    - name: list_pull_requests
    - name: get_issue
    - name: comment_on_issue
    - name: delegate_task
    - name: wait_for_tasks
    - name: create_pull_request
    - name: update_plan
  coordination:
    enabled: true
    autonomous: true
    maxIterations: 10
    maxConcurrentChildren: 3
    maxDepth: 2
    allowedAgents:
      - name: coder
      - name: reviewer
  secretRef:
    name: anthropic-api-key
---
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: coder
spec:
  providerRef:
    name: llm-provider
  systemPrompt:
    inline: |
      You are a coding agent. When given an issue to implement:
      1. Read the issue description carefully and understand the requirements
      2. Explore the codebase to understand the existing architecture
      3. Implement the changes with clean, idiomatic code
      4. Write or update tests to cover your changes
      5. Use create_pull_request to submit your work for review

      Always create your changes on a new branch and write a clear PR description
      that references the original issue.
  tools:
    - name: code_exec
    - name: file_read
    - name: file_write
    - name: web_search
    - name: create_pull_request
  secretRef:
    name: anthropic-api-key
---
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: reviewer
spec:
  providerRef:
    name: llm-provider
  systemPrompt:
    inline: |
      You are a code review agent. When assigned a pull request to review:
      1. Use review_pull_request to fetch the PR diff and changed files
      2. Analyze the code for correctness, security issues, and performance
      3. Check that tests are included and cover the changes adequately
      4. Use post_review_comment to submit your review:
         - Use event "APPROVE" if the code is ready to merge
         - Use event "REQUEST_CHANGES" if issues need fixing
      5. Be constructive, specific, and actionable in your feedback
  tools:
    - name: review_pull_request
    - name: post_review_comment
    - name: code_exec
    - name: file_read
  secretRef:
    name: anthropic-api-key
