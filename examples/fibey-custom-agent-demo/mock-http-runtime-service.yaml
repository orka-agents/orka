apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibey-http-runtime
  labels:
    app.kubernetes.io/name: fibey-http-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fibey-http-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fibey-http-runtime
    spec:
      containers:
      - name: harness
        image: ghcr.io/orka-agents/orka/example-echo-harness:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ORKA_REMOTE_HTTP_RUNTIME_ADDR
          value: :8080
        - name: ORKA_REMOTE_HTTP_RUNTIME_NAME
          value: fibey-http-runtime
        - name: ORKA_REMOTE_HTTP_RUNTIME_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: fibey-http-runtime-token
              key: token
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fibey-http-runtime
spec:
  selector:
    app.kubernetes.io/name: fibey-http-runtime
  ports:
  - name: http
    port: 8080
    targetPort: http
