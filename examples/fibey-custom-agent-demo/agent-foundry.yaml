# Optional Agent that selects the classic Foundry Agent Service backend facade.
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: fibey-remote-foundry
spec:
  runtime:
    runtimeRef:
      name: fibey-foundry-runtime
  systemPrompt:
    inline: |
      You are Fibey's classic Foundry-backed incident scout. Produce a concise dossier and request Orka-brokered tools for evidence or consequential actions.
