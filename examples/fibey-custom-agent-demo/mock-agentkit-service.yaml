apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibey-agentkit
  labels:
    app.kubernetes.io/name: fibey-agentkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fibey-agentkit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fibey-agentkit
    spec:
      containers:
      - name: harness
        image: ghcr.io/sozercan/orka-example-echo-harness:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ORKA_EXAMPLE_HARNESS_ADDR
          value: :8080
        - name: ORKA_EXAMPLE_HARNESS_RUNTIME_NAME
          value: fibey-agentkit
        - name: ORKA_EXAMPLE_HARNESS_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: fibey-agentkit-harness-token
              key: token
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fibey-agentkit
spec:
  selector:
    app.kubernetes.io/name: fibey-agentkit
  ports:
  - name: http
    port: 8080
    targetPort: http
