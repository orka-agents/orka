# Optional harness bearer token for the AgentKit Serve adapter facade.
# This authenticates Orka to the adapter endpoint; it is not a downstream production tool credential.
apiVersion: v1
kind: Secret
metadata:
  name: fibey-agentkit-runtime-token
  annotations:
    orka.ai/agent-runtime-endpoint: http://fibey-agentkit-runtime.default.svc.cluster.local:8080
  labels:
    orka.ai/agent-runtime-auth: "true"
    orka.ai/agent-runtime-name: fibey-agentkit-runtime
stringData:
  token: mock-token
