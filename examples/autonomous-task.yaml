# Example: Autonomous coordinator agent that plans and executes iteratively
#
# Prerequisites:
# - A Provider CRD configured (e.g., "anthropic-provider")
# - Specialist agents for delegation (e.g., "coder", "reviewer")
#
# Usage:
#   kubectl apply -f examples/autonomous-task.yaml
---
apiVersion: core.mercan.ai/v1alpha1
kind: Agent
metadata:
  name: autonomous-coordinator
spec:
  providerRef:
    name: anthropic-provider
  model:
    name: claude-sonnet-4-20250514
    temperature: 0.7
  systemPrompt:
    inline: |
      You are a senior software architect. Break down complex goals into
      manageable tasks, delegate to specialist agents, and iterate until
      the goal is fully achieved.
  coordination:
    enabled: true
    autonomous: true
    maxIterations: 10
    maxDepth: 3
    maxConcurrentChildren: 3
    allowedAgents:
      - name: coder
      - name: reviewer
---
apiVersion: core.mercan.ai/v1alpha1
kind: Task
metadata:
  name: build-todo-api
spec:
  type: ai
  agentRef:
    name: autonomous-coordinator
  prompt: |
    Build a TODO API with the following requirements:
    - RESTful endpoints for CRUD operations
    - SQLite storage backend
    - Input validation
    - Unit tests with >80% coverage
    - API documentation
