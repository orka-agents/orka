apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-http-runtime
  labels:
    app.kubernetes.io/name: support-http-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: support-http-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: support-http-runtime
    spec:
      containers:
      - name: harness
        image: ghcr.io/orka-agents/orka/example-echo-harness:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ORKA_REMOTE_HTTP_RUNTIME_ADDR
          value: :8080
        - name: ORKA_REMOTE_HTTP_RUNTIME_NAME
          value: support-http-runtime
        # Switch to read-tool or approval-tool to exercise brokered read/write protocol paths.
        - name: ORKA_REMOTE_HTTP_RUNTIME_BEHAVIOR
          value: read-tool
        - name: ORKA_REMOTE_HTTP_RUNTIME_READ_TOOL_NAME
          value: support-ticket-lookup
        - name: ORKA_REMOTE_HTTP_RUNTIME_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: support-http-runtime-token
              key: token
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: support-http-runtime
spec:
  selector:
    app.kubernetes.io/name: support-http-runtime
  ports:
  - name: http
    port: 8080
    targetPort: http
