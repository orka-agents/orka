apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: pr-reviewer
  namespace: default
spec:
  secretRef:
    name: claude-runtime-credentials
  runtime:
    type: claude
    defaultMaxTurns: 50
    defaultAllowedTools:
      - Read
      - Glob
      - Grep
      - LS
  systemPrompt:
    inline: |
      Review exact pull request heads and return only Orka's structured review JSON.
---
apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: pr-repairer
  namespace: default
spec:
  secretRef:
    name: codex-runtime-credentials
  runtime:
    type: codex
    defaultMaxTurns: 100
    defaultAllowedTools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
  systemPrompt:
    inline: |
      Repair PR findings selected by Orka RepositoryMonitor. Keep changes scoped and never merge the PR.
