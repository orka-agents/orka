apiVersion: core.orka.ai/v1alpha1
kind: Agent
metadata:
  name: issue-researcher
  namespace: default
spec:
  secretRef:
    name: claude-runtime-credentials
  runtime:
    type: claude
    defaultMaxTurns: 50
    defaultAllowedTools:
      - Read
      - Glob
      - Grep
      - LS
  systemPrompt:
    inline: |
      Research and plan GitHub issues for Orka RepositoryMonitor. Do not mutate GitHub.
