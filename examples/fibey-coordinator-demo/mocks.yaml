            "timeline": [
                "May 19 09:00 - Audit initiated",
                "May 20 - Physical count completed",
                "May 21 15:00 - Report submitted, 400G ZR+ reorder triggered"
            ]
        },
        {
            "id": "INC-20260525-032",
            "title": "Chiller plant efficiency below target \u2014 Building 2",
            "severity": "P3",
            "status": "investigating",
            "type": "cooling",
            "site": "Quincy North",
            "created": "2026-05-25T07:00:00Z",
            "last_update": "2026-05-25T12:30:00Z",
            "description": "Chiller PUE contribution trending 0.08 above target. Likely due to warmer-than-expected ambient this week. Evaluating economizer mode adjustment.",
            "assigned_to": "Facilities Engineering",
            "timeline": [
                "07:00 - Weekly efficiency report flagged regression",
                "08:00 - Correlated with ambient temp spike (34C vs 28C seasonal avg)",
                "12:30 - Economizer setpoint adjustment under review"
            ]
        }
    ]''')


    def now_iso():
        return datetime.now(timezone.utc).isoformat()


    def safe_filename(raw):
        raw = str(raw or "investigation.md").strip() or "investigation.md"
        raw = raw.split("/")[-1].split("\\")[-1]
        raw = re.sub(r"[^A-Za-z0-9._-]+", "-", raw).strip(".-")
        return (raw or "investigation.md")[:120]


    def work_id(prefix, seed):
        del seed  # IDs are per successful non-idempotent request; idempotent retries reuse stored payloads.
        stamp = datetime.now(timezone.utc).strftime("%Y%m%d%H%M%S%f")
        return f"{prefix}-{stamp}"


    class Handler(BaseHTTPRequestHandler):
        def _json(self, status, payload):
            body = json.dumps(payload, indent=2).encode()
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def setup(self):
            super().setup()
            self.connection.settimeout(10)

        def _read(self):
            n = int(self.headers.get("Content-Length", "0"))
            if n < 0:
                raise ValueError("negative Content-Length is invalid")
            if n > MAX_REQUEST_BYTES:
                raise ValueError(f"request body too large: {n} bytes")
            if n == 0:
                return {}
            return json.loads(self.rfile.read(n).decode() or "{}")

        def do_GET(self):
            if self.path == "/healthz":
                return self._json(200, {"ok": True})
            if self.path == "/investigations":
                INVESTIGATIONS_DIR.mkdir(parents=True, exist_ok=True)
                files = sorted(p.name for p in INVESTIGATIONS_DIR.glob("*"))
                return self._json(200, {"status": "success", "count": len(files), "files": files})
            return self._json(404, {"error": "not found"})

        def do_POST(self):
            try:
                args = self._read()
            except ValueError as e:
                return self._json(413, {"status": "error", "error": str(e)})
            checked_at = now_iso()
            if self.path == "/telemetry":
                site = str(args.get("site") or "")
                if site.lower() in ("", "all", "all sites", "*"):
                    telemetry = {
                        "site": "All Sites",
                        "overall_status": "degraded",
                        "sites": [TELEMETRY["quincy_north"], TELEMETRY["default"]],
                    }
                else:
                    key = "quincy_north" if "quincy" in site.lower() else "default"
                    telemetry = TELEMETRY[key]
                return self._json(200, {"status": "success", "telemetry": telemetry, "checkedAt": checked_at})

            if self.path == "/incidents":
                site = str(args.get("site") or "")
                severity = str(args.get("severity") or "")
                status_filter = str(args.get("status") or "")
                incident_id = str(args.get("incident_id") or args.get("incidentId") or "")
                incidents = INCIDENTS
                if incident_id:
                    incidents = [i for i in incidents if incident_id.lower() == i["id"].lower()]
                if not incident_id and not status_filter:
                    incidents = [i for i in incidents if i["status"].lower() != "resolved"]
                if site:
                    incidents = [i for i in incidents if site.lower() in i["site"].lower()]
                if severity:
                    incidents = [i for i in incidents if severity.lower() in i["severity"].lower()]
                if status_filter:
                    incidents = [i for i in incidents if status_filter.lower() in i["status"].lower()]
                if not incident_id and len(incidents) > 5:
                    incidents = [{
                        "incident_id": i["id"],
                        "site": i["site"],
                        "status": i["status"],
                        "type": i.get("type", "unknown"),
                        "priority": i["severity"],
                        "title": i["title"],
                        "last_updated": i["last_update"],
                    } for i in incidents]
                    return self._json(200, {
                        "status": "success",
                        "count": len(incidents),
                        "summary": "Showing summary table. Ask about a specific incident ID for full details.",
                        "incidents": incidents,
                        "checkedAt": checked_at,
                    })
                return self._json(200, {"status": "success", "count": len(incidents), "incidents": incidents, "checkedAt": checked_at})

            if self.path == "/investigations":
                filename = safe_filename(args.get("filename"))
                content = str(args.get("content") or "")
                incident_id = str(args.get("incident_id") or args.get("incidentId") or "")
                if len(content) > MAX_INVESTIGATION_CHARS:
                    return self._json(413, {"status": "error", "error": f"investigation content exceeds {MAX_INVESTIGATION_CHARS} characters"})
                INVESTIGATIONS_DIR.mkdir(parents=True, exist_ok=True)
                target = INVESTIGATIONS_DIR / filename
                existing_files = [p for p in INVESTIGATIONS_DIR.glob("*") if p.is_file()]
                if not target.exists() and len(existing_files) >= MAX_INVESTIGATION_FILES:
                    return self._json(507, {"status": "error", "error": f"investigation file limit {MAX_INVESTIGATION_FILES} reached"})
                header = "# Investigation: " + filename + "\n"
                header += "# Saved: " + checked_at + "\n"
                if incident_id:
                    header += "# Related Incident: " + incident_id + "\n"
                header += "---\n\n"
                body = header + content
                if len(body.encode()) > MAX_INVESTIGATION_BYTES:
                    return self._json(413, {"status": "error", "error": f"investigation file exceeds {MAX_INVESTIGATION_BYTES} bytes"})
                target.write_text(body)
                return self._json(200, {
                    "status": "success",
                    "message": f"Investigation saved to {target}",
                    "path": str(target),
                    "size_bytes": target.stat().st_size,
                })

            if self.path == "/work-order":
                key = self.headers.get("Idempotency-Key") or args.get("idempotencyKey") or args.get("idempotency_key")
                if key and key in fired:
                    prior = dict(fired[key])
                    prior["duplicate"] = True
                    return self._json(200, prior)
                title = str(args.get("title") or "Untitled work order")
                assignee = str(args.get("assignee") or "Field Tech On-Site")
                wo_id = work_id("WO", title)
                payload = {
                    "status": "success",
                    "work_order": {
                        "id": wo_id,
                        "title": title,
                        "priority": args.get("priority") or "P2",
                        "site": args.get("site") or "",
                        "description": args.get("description") or "",
                        "assignee": assignee,
                        "status": "Dispatched",
                        "createdAt": checked_at,
                        "received": args,
                    },
                    "message": f"Work order {wo_id} created and dispatched to {assignee}.",
                    "duplicate": False,
                }
                if key:
                    fired[key] = payload
                return self._json(200, payload)

            if self.path == "/escalate":
                key = self.headers.get("Idempotency-Key") or args.get("idempotencyKey") or args.get("idempotency_key")
                if key and key in fired:
                    prior = dict(fired[key])
                    prior["duplicate"] = True
                    return self._json(200, prior)
                incident_id = str(args.get("incident_id") or args.get("incidentId") or "")
                reason = str(args.get("reason") or "")
                escalate_to = str(args.get("escalate_to") or args.get("escalateTo") or "Engineering Lead")
                esc_id = work_id("ESC", incident_id + reason + escalate_to)
                payload = {
                    "status": "success",
                    "message": f"Incident {incident_id} escalated to {escalate_to}.",
                    "escalation": {
                        "id": esc_id,
                        "status": "Dispatched",
                        "incident_id": incident_id,
                        "escalated_to": escalate_to,
                        "reason": reason,
                        "createdAt": checked_at,
                        "escalated_at": checked_at,
                        "new_severity": "P1",
                        "sla_response_minutes": 15,
                        "received": args,
                    },
                    "duplicate": False,
                }
                if key:
                    fired[key] = payload
                return self._json(200, payload)

            return self._json(404, {"error": "not found"})

        def log_message(self, fmt, *args):
            print("fibey-mocks", self.address_string(), fmt % args)


    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibey-mocks
  namespace: orka-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fibey-mocks
  template:
    metadata:
      labels:
        app: fibey-mocks
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: python:3.12-alpine
          command: ["python", "/app/server.py"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: FIBEY_HOME
              value: "/fibey"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: investigations
              mountPath: "/fibey/investigations"
      volumes:
        - name: app
          configMap:
            name: fibey-mocks
        - name: investigations
          emptyDir:
            sizeLimit: 10Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fibey-mocks
  namespace: orka-system
spec:
  selector:
    app: fibey-mocks
  ports:
    - name: http
      port: 8080
      targetPort: http
