name: Live GitHub Label Trigger E2E

on:
  workflow_dispatch:
    inputs:
      target_repo_url:
        description: GitHub repository URL to place in the synthetic label webhook payload.
        required: true
        type: string
        default: https://github.com/orka-agents/orka
      target_number:
        description: Synthetic issue number to place in the webhook payload.
        required: true
        type: string
        default: "1"

permissions:
  contents: read

concurrency:
  group: live-github-label-trigger-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-github-label-trigger-e2e:
    name: Live GitHub Label Trigger E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      KIND_CLUSTER: orka-live-github-label-trigger-e2e
      KIND_VERSION: v0.31.0
      GITHUB_LABEL_TRIGGER_TARGET_REPO_URL: ${{ inputs.target_repo_url }}
      GITHUB_LABEL_TRIGGER_TARGET_NUMBER: ${{ inputs.target_number }}
    steps:
      - name: Clone Orka
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Create UI embed stub
        run: make ensure-ui-embed

      - name: Run focused GitHub automation tests
        run: |
          go test ./internal/tools ./internal/api \
            -run 'Test(CreatePRMonitor|CheckPRReviewMarker|GitHubWebhook|ChatRegistry)' \
            -count=1 \
            -v

      - name: Install kind
        run: |
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run live GitHub label trigger e2e
        run: bash scripts/live-github-label-trigger-e2e.sh
