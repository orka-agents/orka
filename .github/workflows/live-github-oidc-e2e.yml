name: Live GitHub OIDC E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  push:
    paths-ignore:
      - ".agents/**"
      - ".claude/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: live-github-oidc-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-github-oidc-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KIND_CLUSTER: orka-live-github-oidc-e2e
      ORKA_GITHUB_OIDC_AUDIENCE: orka-live-github-oidc-e2e
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: bash scripts/live-github-oidc-e2e.sh
