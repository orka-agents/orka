name: Live GitHub OIDC E2E

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  id-token: write

concurrency:
  group: live-github-oidc-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-github-oidc-e2e:
    name: Live GitHub OIDC E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      KIND_CLUSTER: orka-live-github-oidc-e2e
      ORKA_GITHUB_OIDC_AUDIENCE: orka-live-github-oidc-e2e
      KIND_VERSION: v0.31.0
    steps:
      - name: Clone Orka
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run live GitHub OIDC e2e
        run: bash scripts/live-github-oidc-e2e.sh
