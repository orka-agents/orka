name: Live GitHub OIDC E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  push:
    paths-ignore:
      - ".agents/**"
      - ".claude/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: live-github-oidc-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-github-oidc-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KIND_CLUSTER: orka-live-github-oidc-e2e
      ORKA_GITHUB_OIDC_AUDIENCE: orka-live-github-oidc-e2e
      KIND_VERSION: v0.31.0
      KIND_SHA256_AMD64: eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa
      KIND_SHA256_ARM64: 8e1014e87c34901cc422a1445866835d1e666f2a61301c27e722bdeab5a1f7e4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install kind
        run: |
          arch="$(go env GOARCH)"
          case "${arch}" in
            amd64) expected_sha="${KIND_SHA256_AMD64}" ;;
            arm64) expected_sha="${KIND_SHA256_ARM64}" ;;
            *) echo "unsupported runner architecture: ${arch}" >&2; exit 1 ;;
          esac
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-${arch}"
          printf '%s  %s\n' "${expected_sha}" ./kind | sha256sum --check --strict -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Verify kind installation
        run: kind version
      - run: bash scripts/live-github-oidc-e2e.sh
