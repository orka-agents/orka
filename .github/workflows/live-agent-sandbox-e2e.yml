name: Live Agent Sandbox E2E

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - ".agents/**"
      - ".claude/**"
  pull_request:
    paths-ignore:
      - ".agents/**"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: live-agent-sandbox-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  live-agent-sandbox-e2e:
    name: Live Agent Sandbox E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KIND_CLUSTER: orka-live-agent-sandbox-e2e
      KIND_VERSION: v0.31.0
    steps:
      - name: Clone Orka
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free disk space for Docker-heavy live E2E
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup"
          df -h
          docker system df || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup"
          df -h
          docker system df || true

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run live agent sandbox e2e
        run: bash scripts/live-agent-sandbox-e2e.sh
