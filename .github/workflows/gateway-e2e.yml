name: Gateway Live E2E

on:
  workflow_dispatch:
  push:
    paths:
      - ".dockerignore"
      - ".github/workflows/gateway-e2e.yml"
      - "Dockerfile"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "examples/harness/echo/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "test/e2e/**"
      - "test/utils/**"
      - "ui/**"
      - "workers/**"
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/gateway-e2e.yml"
      - "Dockerfile"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "examples/harness/echo/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "test/e2e/**"
      - "test/utils/**"
      - "ui/**"
      - "workers/**"

permissions:
  contents: read

concurrency:
  group: gateway-live-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gateway-live-e2e:
    name: Gateway live E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_AGENTRUNTIME_EXTERNAL: "true"
      E2E_GATEWAY: "true"
      E2E_GO_TEST_TIMEOUT: 30m
      KIND_CLUSTER: orka-gateway-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      KIND_VERSION: v0.31.0
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Free disk space for Docker-heavy E2E
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup"
          df -h
          docker system df || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup"
          df -h
          docker system df || true

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -fsSL --retry 3 --retry-delay 2 -o ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run Gateway live E2E
        run: |
          set -Eeuo pipefail
          trap 'kind delete cluster --name "${KIND_CLUSTER}" || true' EXIT
          make setup-test-e2e KIND_CLUSTER="${KIND_CLUSTER}"
          go test -tags=e2e ./test/e2e/ \
            -timeout "${E2E_GO_TEST_TIMEOUT}" \
            -v \
            -ginkgo.v \
            -ginkgo.fail-on-empty \
            -ginkgo.focus "Gateway live E2E"
