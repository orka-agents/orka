name: Agent Substrate E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/agent-substrate-e2e.yml"
      - "Dockerfile"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "hack/**"
      - "internal/**"
      - "pkg/**"
      - "scripts/agent-substrate-e2e.sh"
      - "workers/**"
  push:
    paths:
      - ".dockerignore"
      - ".github/workflows/agent-substrate-e2e.yml"
      - "Dockerfile"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "hack/**"
      - "internal/**"
      - "pkg/**"
      - "scripts/agent-substrate-e2e.sh"
      - "workers/**"

permissions:
  contents: read

concurrency:
  group: agent-substrate-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  agent-substrate-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KIND_CLUSTER: orka-agent-substrate-e2e
      KIND_VERSION: v0.31.0
      KO_VERSION: v0.18.1
      SUBSTRATE_REF: b80031d260959b1fc5c6f61e3099fe2a6d368af1
      SUBSTRATE_E2E_EXTENDED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache: true

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
          go install github.com/google/ko@${KO_VERSION}

      - name: Verify toolchain
        run: |
          kind version
          kubectl version --client=true
          ko version

      - name: Run Agent Substrate E2E
        run: bash scripts/agent-substrate-e2e.sh
