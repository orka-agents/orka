name: Security Scan E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/security-scan-e2e.yml"
      - "Dockerfile"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "hack/**"
      - "internal/**"
      - "pkg/**"
      - "scripts/security-scan-e2e.sh"
      - "workers/**"
  push:
    paths:
      - ".dockerignore"
      - ".github/workflows/security-scan-e2e.yml"
      - "Dockerfile"
      - "Makefile"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "hack/**"
      - "internal/**"
      - "pkg/**"
      - "scripts/security-scan-e2e.sh"
      - "workers/**"

permissions:
  contents: read

concurrency:
  group: security-scan-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security-scan-e2e:
    name: Security Scan E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KIND_CLUSTER: orka-security-scan-e2e
      KIND_VERSION: v0.31.0
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify toolchain
        run: |
          kind version
          kubectl version --client=true
          jq --version

      - name: Run security scan e2e
        run: bash scripts/security-scan-e2e.sh
