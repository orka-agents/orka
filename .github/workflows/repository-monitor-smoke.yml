name: Repository Monitor Smoke

on:
  push:
    paths:
      - ".github/workflows/repository-monitor-smoke.yml"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "workers/**"
  pull_request:
    paths:
      - ".github/workflows/repository-monitor-smoke.yml"
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "workers/**"

permissions:
  contents: read

concurrency:
  group: repository-monitor-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-monitor-smoke:
    name: RepositoryMonitor Queue and Review Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Create UI embed stub
        run: make ensure-ui-embed

      - name: Run RepositoryMonitor smoke tests
        run: |
          go test ./internal/store/sqlite \
            -run 'TestRepositoryMonitorStoreCRUD|TestMonitorStoreRunsItemsReviewsRepairsAndEvents' \
            -count=1 \
            -v
          go test ./internal/api \
            -run 'TestRepositoryMonitorHandlers|TestCreateRepositoryMonitor|TestGitHubWebhook_PullRequestEvent' \
            -count=1 \
            -v
          go test ./internal/controller \
            -run 'TestRepositoryMonitor(Reconcile|Status)|TestReadRepositoryMonitorGitHubResponse|TestJobBuilder_Build_AgentTask_ReadOnlyAnnotation|TestJobBuilder_BuildWithOptions_ReadOnlyAgentWorkspaceWrapper|TestExtractStdoutTaskResult|TestStdoutResultPodLogOptionsReadsBoundedFullLog' \
            -count=1 \
            -v
          go test ./workers/common \
            -run 'TestSubmitResult_ResultStdoutWritesMarkerFile|TestRunAgent_ResultStdoutSubmitsRawExecutorOutputWithGitWorkspace|TestRunAgent_AgentSandboxForwardsStdoutResultMarker|TestWorkspaceStdoutResultMarkerDownloadsMarkerWhenStdoutTruncated|TestRunAgent_ExecutionWorkspaceForwardsStdoutResultMarker' \
            -count=1 \
            -v
          go test ./internal/tools \
            -run 'TestCheckPRReviewMarkerTool|TestContainsPRReviewMarkerRequiresSignedMarker|TestCreatePRMonitorTool' \
            -count=1 \
            -v
