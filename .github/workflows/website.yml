name: Website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('website-pr-{0}', github.event.pull_request.number) || 'gh-pages' }}
  cancel-in-progress: false

jobs:
  check_typos:
    name: Check typos
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check typos
        uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2
        with:
          files: website .github/workflows/website.yml

  build:
    name: Build and publish Docusaurus site
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # PR builds run PR-controlled yarn scripts; don't leave a write-scoped
          # git credential on disk for them. The publish step below authenticates
          # with its own explicit tokenized remote instead.
          persist-credentials: false

      - name: Enable Corepack
        # Pin Yarn to the version in package.json's packageManager field so the
        # build uses the repo-declared Yarn 1.x against the committed v1 lockfile,
        # not whatever Yarn the runner's Corepack defaults to (e.g. Yarn 4).
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: website/yarn.lock

      - name: Install dependencies
        working-directory: website
        run: yarn install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: yarn build

      - name: Publish to gh-pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf gh-pages
          git init gh-pages
          cd gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # Remove files left by the previous root-level website deployment,
          # while preserving Pages metadata and Helm chart artifacts.
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.nojekyll' \
            ! -name 'CNAME' \
            ! -name 'website' \
            ! -name 'charts' \
            ! -name 'index.yaml' \
            ! -name '*.tgz' \
            ! -name '*.prov' \
            -exec rm -rf {} +

          mkdir -p website
          rsync -a --delete ../website/build/ website/
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No website changes to publish."
            exit 0
          fi

          git commit -m "Deploy website"
          git push origin HEAD:gh-pages
