name: Website

on:
  push:
    branches:
      - main
    paths:
      - "_typos.toml"
      - "website/**"
      - ".github/workflows/website.yml"
  pull_request:
    paths:
      - "_typos.toml"
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('website-pr-{0}', github.event.pull_request.number) || 'gh-pages' }}
  cancel-in-progress: false

jobs:
  check_typos:
    name: Check typos
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check typos
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          files: website .github/workflows/website.yml

  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # PR builds run PR-controlled yarn scripts; don't leave a write-scoped
          # git credential on disk for them. The publish step below authenticates
          # with its own explicit tokenized remote instead.
          persist-credentials: false

      - name: Enable Corepack
        # Pin Yarn to the version in package.json's packageManager field so the
        # build uses the repo-declared Yarn 1.x against the committed v1 lockfile,
        # not whatever Yarn the runner's Corepack defaults to (e.g. Yarn 4).
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: website/yarn.lock

      - name: Install dependencies
        working-directory: website
        run: yarn install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: yarn build

  publish:
    name: Publish Docusaurus site
    needs: [check_typos, build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: website/yarn.lock

      - name: Install dependencies
        working-directory: website
        run: yarn install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: yarn build

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf gh-pages
          git init gh-pages
          cd gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # Replace the website at the Pages root while preserving Pages
          # metadata and Helm chart repository artifacts.
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.nojekyll' \
            ! -name 'CNAME' \
            ! -name 'charts' \
            ! -name 'index.yaml' \
            ! -name '*.tgz' \
            ! -name '*.prov' \
            -exec rm -rf {} +

          rsync -a ../website/build/ ./
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No website changes to publish."
            exit 0
          fi

          git commit -m "Deploy website"
          git push origin HEAD:gh-pages
