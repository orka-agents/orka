name: Live Copilot Proxy E2E

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - ".agents/**"
      - ".claude/**"
  pull_request:
    paths-ignore:
      - ".agents/**"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: live-copilot-proxy-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  live-copilot-proxy-e2e:
    name: Live Copilot Proxy E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      KIND_CLUSTER: orka-live-copilot-proxy-e2e
      COPILOT_PROXY_IMAGE: ghcr.io/sozercan/vekil:latest
    steps:
      - name: Decide whether live e2e can run
        id: gate
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork || false }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ "${IS_FORK}" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping live copilot-proxy e2e for fork pull requests because repository secrets are not exposed." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${ACTOR}" = "dependabot[bot]" ] && [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping live copilot-proxy e2e for Dependabot pull requests because repository secrets are not exposed." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "COPILOT_GITHUB_TOKEN repository secret is required for live copilot-proxy e2e." >&2
            exit 1
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Explain skipped live e2e
        if: steps.gate.outputs.run != 'true'
        run: echo "${{ steps.gate.outputs.reason }}"

      - name: Clone Orka
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free disk space for Docker-heavy live E2E
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup"
          df -h
          docker system df || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup"
          df -h
          docker system df || true

      - name: Setup Go
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install kind
        if: steps.gate.outputs.run == 'true'
        run: |
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        if: steps.gate.outputs.run == 'true'
        run: kind version

      - name: Run live copilot proxy e2e
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/live-copilot-proxy-e2e.sh
