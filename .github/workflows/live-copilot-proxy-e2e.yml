name: Live Copilot Proxy E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".codex/**"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: live-copilot-proxy-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  live-copilot-proxy-e2e:
    name: Live Copilot Proxy E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      KIND_CLUSTER: orka-live-copilot-proxy-e2e
      COPILOT_PROXY_IMAGE: docker.io/sozercan/copilot-proxy:latest
    steps:
      - name: Decide whether live e2e can run
        id: gate
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping live copilot-proxy e2e for pull requests because it requires repository secrets." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "COPILOT_GITHUB_TOKEN repository secret is required for live copilot-proxy e2e." >&2
            exit 1
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Explain skipped live e2e
        if: steps.gate.outputs.run != 'true'
        run: echo "${{ steps.gate.outputs.reason }}"

      - name: Clone Orka
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Free disk space for Docker-heavy live E2E
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup"
          df -h
          docker system df || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup"
          df -h
          docker system df || true

      - name: Setup Go
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install kind
        if: steps.gate.outputs.run == 'true'
        run: |
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        if: steps.gate.outputs.run == 'true'
        run: kind version

      - name: Run live copilot proxy e2e
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/live-copilot-proxy-e2e.sh
