name: Release Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: controller
            image_suffix: ""
            dockerfile: Dockerfile
            context: .
          - image: ai-worker
            image_suffix: "/ai-worker"
            dockerfile: workers/ai/Dockerfile
            context: .
          - image: general-worker
            image_suffix: "/general-worker"
            dockerfile: workers/general/Dockerfile
            context: .
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
            dockerfile: workers/harness/Dockerfile
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Save release tags
        run: |
          cat > tags-${{ matrix.image }}.txt <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Save image digest
        run: printf '%s' '${{ steps.build.outputs.digest }}' > digest-${{ matrix.image }}.txt

      - name: Upload image digest
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c84b9ecb0b81bc0de3c06 # v4
        with:
          name: digest-${{ matrix.image }}
          path: digest-${{ matrix.image }}.txt

      - name: Upload release tags
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c84b9ecb0b81bc0de3c06 # v4
        with:
          name: tags-${{ matrix.image }}
          path: tags-${{ matrix.image }}.txt

      - name: Set up Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Generate platform SBOMs
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
          SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          "${SYFT_CMD}" scan --platform linux/amd64 "${IMAGE_REF}@${IMAGE_DIGEST}" -o spdx-json="sbom-${{ matrix.image }}-linux-amd64.spdx.json"
          "${SYFT_CMD}" scan --platform linux/arm64 "${IMAGE_REF}@${IMAGE_DIGEST}" -o spdx-json="sbom-${{ matrix.image }}-linux-arm64.spdx.json"

      - name: Upload SBOMs
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c84b9ecb0b81bc0de3c06 # v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}-*.spdx.json

  scan:
    name: Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: controller
            image_suffix: ""
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: controller
            image_suffix: ""
            platform: linux/arm64
            platform_slug: linux-arm64
          - image: ai-worker
            image_suffix: "/ai-worker"
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: ai-worker
            image_suffix: "/ai-worker"
            platform: linux/arm64
            platform_slug: linux-arm64
          - image: general-worker
            image_suffix: "/general-worker"
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: general-worker
            image_suffix: "/general-worker"
            platform: linux/arm64
            platform_slug: linux-arm64
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
            platform: linux/arm64
            platform_slug: linux-arm64
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digest
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: digest-${{ matrix.image }}
          path: digests

      - name: Read image digest
        id: digest
        run: echo "value=$(cat digests/digest-${{ matrix.image }}.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea69db56b # v0
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}@${{ steps.digest.outputs.value }}
          format: sarif
          output: trivy-${{ matrix.image }}-${{ matrix.platform_slug }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@ff82a3f0d98ec3cdc78ee8e96ffa7b68c8f68367 # v3
        with:
          sarif_file: trivy-${{ matrix.image }}-${{ matrix.platform_slug }}.sarif
          category: trivy-${{ matrix.image }}-${{ matrix.platform_slug }}
        if: always()

  sign-and-attest:
    name: Sign Images and Attest SBOMs
    needs:
      - build-and-push
      - scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        include:
          - image: controller
            image_suffix: ""
          - image: ai-worker
            image_suffix: "/ai-worker"
          - image: general-worker
            image_suffix: "/general-worker"
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Download image digest
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: digest-${{ matrix.image }}
          path: digests

      - name: Download SBOMs
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: sbom-${{ matrix.image }}
          path: sboms

      - name: Read image digest
        id: digest
        run: echo "value=$(cat digests/digest-${{ matrix.image }}.txt)" >> "$GITHUB_OUTPUT"

      - name: Resolve platform digests
        id: platform-digests
        env:
          IMAGE_DIGEST: ${{ steps.digest.outputs.value }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          manifest_json=$(docker buildx imagetools inspect --raw "${IMAGE_REF}@${IMAGE_DIGEST}")
          amd64_digest=$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest' <<<"${manifest_json}")
          arm64_digest=$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64") | .digest' <<<"${manifest_json}")
          test -n "${amd64_digest}" && test "${amd64_digest}" != "null"
          test -n "${arm64_digest}" && test "${arm64_digest}" != "null"
          echo "linux_amd64=${amd64_digest}" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=${arm64_digest}" >> "$GITHUB_OUTPUT"

      - name: Sign image index
        env:
          IMAGE_DIGEST: ${{ steps.digest.outputs.value }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
        run: cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

      - name: Attest platform SBOMs
        env:
          AMD64_DIGEST: ${{ steps.platform-digests.outputs.linux_amd64 }}
          ARM64_DIGEST: ${{ steps.platform-digests.outputs.linux_arm64 }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          cosign attest --yes --type spdxjson --predicate "sboms/sbom-${{ matrix.image }}-linux-amd64.spdx.json" "${IMAGE_REF}@${AMD64_DIGEST}"
          cosign attest --yes --type spdxjson --predicate "sboms/sbom-${{ matrix.image }}-linux-arm64.spdx.json" "${IMAGE_REF}@${ARM64_DIGEST}"

  promote-release-tags:
    name: Promote Release Tags
    needs: sign-and-attest
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true

      - name: Download release tags
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: tags-*
          path: tags
          merge-multiple: true

      - name: Promote release tags
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail

          promote_image() {
            local image="$1"
            local image_suffix="$2"
            local digest
            digest=$(cat "digests/digest-${image}.txt")
            local image_ref="${REGISTRY}/${IMAGE_PREFIX}${image_suffix}"

            while IFS= read -r tag; do
              test -n "${tag}" || continue
              docker buildx imagetools create -t "${tag}" "${image_ref}@${digest}"
            done < "tags/tags-${image}.txt"
          }

          promote_image controller ""
          promote_image ai-worker "/ai-worker"
          promote_image general-worker "/general-worker"
          promote_image agent-harness-wrapper "/agent-harness-wrapper"
