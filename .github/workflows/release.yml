name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release metadata and Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Show Helm version
        run: helm version

      - name: Validate tag and promoted chart metadata
        run: |
          set -euo pipefail

          tag=${GITHUB_REF_NAME}
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(beta|rc)\.[0-9]+)?$ ]]; then
            echo "Release tag must match vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-rc.N; got ${tag}." >&2
            exit 1
          fi

          chart_field() {
            local field=$1
            local value
            value=$(awk -v key="${field}:" '$1 == key { print $2; exit }' charts/orka/Chart.yaml)
            value=${value#\"}
            value=${value%\"}
            value=${value#\'}
            value=${value%\'}
            if [[ -z "${value}" ]]; then
              echo "Could not read ${field} from charts/orka/Chart.yaml." >&2
              return 1
            fi
            printf '%s\n' "${value}"
          }

          expected_chart_version=${tag#v}
          chart_version=$(chart_field version)
          app_version=$(chart_field appVersion)

          if [[ "${chart_version}" != "${expected_chart_version}" ]]; then
            echo "Tag ${tag} requires charts/orka version ${expected_chart_version}; found ${chart_version}." >&2
            exit 1
          fi
          if [[ "${app_version}" != "${tag}" ]]; then
            echo "Tag ${tag} requires charts/orka appVersion ${tag}; found ${app_version}." >&2
            exit 1
          fi

      - name: Verify promoted snapshot provenance
        run: |
          set -euo pipefail

          diff --no-dereference --recursive --unified manifest_staging/charts/orka charts/orka
          diff --no-dereference --recursive --unified manifest_staging/deploy deploy

      - name: Check promoted CRD synchronization
        run: scripts/helm-crds.sh check charts/orka

      - name: Lint promoted chart
        run: helm lint charts/orka

      - name: Package and verify promoted chart
        run: |
          set -euo pipefail

          mkdir -p cr-release-packages
          helm package charts/orka --destination cr-release-packages

          shopt -s nullglob
          chart_packages=(cr-release-packages/orka-*.tgz)
          if [[ ${#chart_packages[@]} -ne 1 ]]; then
            echo "Expected exactly one packaged Orka chart, found ${#chart_packages[@]}." >&2
            exit 1
          fi
          scripts/helm-crds.sh check-package "${chart_packages[0]}"

      - name: Verify immutable chart version
        run: |
          set -euo pipefail

          shopt -s nullglob
          chart_packages=(cr-release-packages/orka-*.tgz)
          [[ ${#chart_packages[@]} -eq 1 ]]
          candidate=${chart_packages[0]}
          package_name=$(basename "${candidate}")
          comparison_dir=$(mktemp -d)
          trap 'rm -rf "${comparison_dir}"' EXIT

          set +e
          git ls-remote --exit-code --heads origin refs/heads/gh-pages >/dev/null
          probe_status=$?
          set -e
          case "${probe_status}" in
            0)
              git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
              ;;
            2)
              echo "No published Helm repository exists yet."
              exit 0
              ;;
            *)
              echo "Could not determine whether the gh-pages branch exists." >&2
              exit "${probe_status}"
              ;;
          esac

          for published_path in "charts/${package_name}" "${package_name}"; do
            if ! git cat-file -e "origin/gh-pages:${published_path}" 2>/dev/null; then
              continue
            fi
            published_archive="${comparison_dir}/$(basename "${published_path}")"
            git show "origin/gh-pages:${published_path}" > "${published_archive}"
            if cmp -s "${candidate}" "${published_archive}" || \
               python3 -I scripts/compare-helm-chart-packages.py "${candidate}" "${published_archive}"; then
              echo "Published ${published_path} has identical normalized contents."
            else
              echo "Chart ${package_name} already exists with different contents." >&2
              echo "Prepare and promote a new chart version before tagging." >&2
              exit 1
            fi
          done

      - name: Upload validated release chart
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-release-chart-package
          path: cr-release-packages/orka-*.tgz
          if-no-files-found: error
          retention-days: 1

  build-and-push:
    needs: validate-release
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: controller
            image_suffix: ""
            dockerfile: Dockerfile
            context: .
          - image: ai-worker
            image_suffix: "/ai-worker"
            dockerfile: workers/ai/Dockerfile
            context: .
          - image: general-worker
            image_suffix: "/general-worker"
            dockerfile: workers/general/Dockerfile
            context: .
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
            dockerfile: workers/harness/Dockerfile
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
          # docker/metadata-action's semver {{version}} output strips the
          # leading v; release-manifest writes the same bare version into the
          # chart's image tags while retaining v in appVersion.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Save release tags
        run: |
          cat > tags-${{ matrix.image }}.txt <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Save image digest
        run: printf '%s' '${{ steps.build.outputs.digest }}' > digest-${{ matrix.image }}.txt

      - name: Upload image digest
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c84b9ecb0b81bc0de3c06 # v4
        with:
          name: digest-${{ matrix.image }}
          path: digest-${{ matrix.image }}.txt

      - name: Upload release tags
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c84b9ecb0b81bc0de3c06 # v4
        with:
          name: tags-${{ matrix.image }}
          path: tags-${{ matrix.image }}.txt

      - name: Set up Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Generate platform SBOMs
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
          SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          "${SYFT_CMD}" scan --platform linux/amd64 "${IMAGE_REF}@${IMAGE_DIGEST}" -o spdx-json="sbom-${{ matrix.image }}-linux-amd64.spdx.json"
          "${SYFT_CMD}" scan --platform linux/arm64 "${IMAGE_REF}@${IMAGE_DIGEST}" -o spdx-json="sbom-${{ matrix.image }}-linux-arm64.spdx.json"

      - name: Upload SBOMs
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c84b9ecb0b81bc0de3c06 # v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}-*.spdx.json

  scan:
    name: Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: controller
            image_suffix: ""
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: controller
            image_suffix: ""
            platform: linux/arm64
            platform_slug: linux-arm64
          - image: ai-worker
            image_suffix: "/ai-worker"
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: ai-worker
            image_suffix: "/ai-worker"
            platform: linux/arm64
            platform_slug: linux-arm64
          - image: general-worker
            image_suffix: "/general-worker"
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: general-worker
            image_suffix: "/general-worker"
            platform: linux/arm64
            platform_slug: linux-arm64
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
            platform: linux/amd64
            platform_slug: linux-amd64
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
            platform: linux/arm64
            platform_slug: linux-arm64
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-${{ matrix.image }}
          path: digests

      - name: Read image digest
        id: digest
        run: echo "value=$(cat digests/digest-${{ matrix.image }}.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea69db56b # v0
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}@${{ steps.digest.outputs.value }}
          format: sarif
          output: trivy-${{ matrix.image }}-${{ matrix.platform_slug }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@ff82a3f0d98ec3cdc78ee8e96ffa7b68c8f68367 # v3
        with:
          sarif_file: trivy-${{ matrix.image }}-${{ matrix.platform_slug }}.sarif
          category: trivy-${{ matrix.image }}-${{ matrix.platform_slug }}
        if: always()

  sign-and-attest:
    name: Sign Images and Attest SBOMs
    needs:
      - build-and-push
      - scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        include:
          - image: controller
            image_suffix: ""
          - image: ai-worker
            image_suffix: "/ai-worker"
          - image: general-worker
            image_suffix: "/general-worker"
          - image: agent-harness-wrapper
            image_suffix: "/agent-harness-wrapper"
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download image digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digest-${{ matrix.image }}
          path: digests

      - name: Download SBOMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-${{ matrix.image }}
          path: sboms

      - name: Read image digest
        id: digest
        run: echo "value=$(cat digests/digest-${{ matrix.image }}.txt)" >> "$GITHUB_OUTPUT"

      - name: Resolve platform digests
        id: platform-digests
        env:
          IMAGE_DIGEST: ${{ steps.digest.outputs.value }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          manifest_json=$(docker buildx imagetools inspect --raw "${IMAGE_REF}@${IMAGE_DIGEST}")
          amd64_digest=$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest' <<<"${manifest_json}")
          arm64_digest=$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64") | .digest' <<<"${manifest_json}")
          test -n "${amd64_digest}" && test "${amd64_digest}" != "null"
          test -n "${arm64_digest}" && test "${arm64_digest}" != "null"
          echo "linux_amd64=${amd64_digest}" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=${arm64_digest}" >> "$GITHUB_OUTPUT"

      - name: Sign image index
        env:
          IMAGE_DIGEST: ${{ steps.digest.outputs.value }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
        run: cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

      - name: Attest platform SBOMs
        env:
          AMD64_DIGEST: ${{ steps.platform-digests.outputs.linux_amd64 }}
          ARM64_DIGEST: ${{ steps.platform-digests.outputs.linux_arm64 }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.image_suffix }}
        run: |
          set -euo pipefail
          cosign attest --yes --type spdxjson --predicate "sboms/sbom-${{ matrix.image }}-linux-amd64.spdx.json" "${IMAGE_REF}@${AMD64_DIGEST}"
          cosign attest --yes --type spdxjson --predicate "sboms/sbom-${{ matrix.image }}-linux-arm64.spdx.json" "${IMAGE_REF}@${ARM64_DIGEST}"

  promote-release-tags:
    name: Promote Release Tags
    needs: sign-and-attest
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true

      - name: Download release tags
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: tags-*
          path: tags
          merge-multiple: true

      - name: Promote release tags
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail

          promote_image() {
            local image="$1"
            local image_suffix="$2"
            local digest
            digest=$(cat "digests/digest-${image}.txt")
            local image_ref="${REGISTRY}/${IMAGE_PREFIX}${image_suffix}"

            while IFS= read -r tag; do
              test -n "${tag}" || continue
              docker buildx imagetools create -t "${tag}" "${image_ref}@${digest}"
            done < "tags/tags-${image}.txt"
          }

          promote_image controller ""
          promote_image ai-worker "/ai-worker"
          promote_image general-worker "/general-worker"
          promote_image agent-harness-wrapper "/agent-harness-wrapper"

  publish-helm-chart:
    name: Publish promoted Helm chart
    needs:
      - validate-release
      - promote-release-tags
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download validated release chart
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-release-chart-package
          path: cr-release-packages

      - name: Show Helm version
        run: helm version

      - name: Publish chart repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf gh-pages
          git init gh-pages
          cd gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          set +e
          git ls-remote --exit-code --heads origin refs/heads/gh-pages >/dev/null
          probe_status=$?
          set -e
          case "${probe_status}" in
            0)
              git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
              git checkout -B gh-pages origin/gh-pages
              ;;
            2)
              git checkout --orphan gh-pages
              git rm -rf . || true
              ;;
            *)
              echo "Could not determine whether the gh-pages branch exists." >&2
              exit "${probe_status}"
              ;;
          esac

          mkdir -p charts
          refresh_index=false

          # Migrate chart archives and any matching provenance files as atomic pairs
          # from the previous root-level repository layout while preserving the
          # website content that shares this branch.
          shopt -s nullglob
          for artifact in ./*.tgz; do
            target="charts/$(basename "${artifact}")"
            provenance="${artifact}.prov"
            target_provenance="${target}.prov"

            if [[ -e "${target}" ]]; then
              if ! cmp -s "${artifact}" "${target}"; then
                if [[ -e "${provenance}" ]]; then
                  echo "Refusing to normalize $(basename "${artifact}") because its provenance signs the exact archive bytes." >&2
                  exit 1
                fi
                if ! python3 -I "${GITHUB_WORKSPACE}/scripts/compare-helm-chart-packages.py" "${artifact}" "${target}"; then
                  echo "Conflicting root and charts/ archives exist for $(basename "${artifact}")." >&2
                  exit 1
                fi
              fi
              rm -f "${artifact}"

              if [[ -e "${provenance}" ]]; then
                if [[ -e "${target_provenance}" ]]; then
                  if ! cmp -s "${provenance}" "${target_provenance}"; then
                    echo "Conflicting root and charts/ provenance files exist for $(basename "${provenance}")." >&2
                    exit 1
                  fi
                  rm -f "${provenance}"
                else
                  mv "${provenance}" "${target_provenance}"
                fi
              fi
            else
              if [[ -e "${target_provenance}" ]]; then
                echo "Refusing to pair $(basename "${artifact}") with an orphaned charts/ provenance file." >&2
                exit 1
              fi
              mv "${artifact}" "${target}"
              if [[ -e "${provenance}" ]]; then
                mv "${provenance}" "${target_provenance}"
              fi
            fi
            refresh_index=true
          done

          orphaned_provenance=(./*.prov)
          if [[ ${#orphaned_provenance[@]} -ne 0 ]]; then
            echo "Refusing to migrate orphaned root-level provenance files:" >&2
            printf '  %s\n' "${orphaned_provenance[@]}" >&2
            exit 1
          fi
          if [[ -f index.yaml && ! -f charts/index.yaml ]]; then
            mv index.yaml charts/index.yaml
            refresh_index=true
          elif [[ -f index.yaml ]]; then
            rm -f index.yaml
            refresh_index=true
          fi

          chart_packages=(../cr-release-packages/orka-*.tgz)
          if [[ ${#chart_packages[@]} -ne 1 ]]; then
            echo "Expected exactly one validated Orka chart, found ${#chart_packages[@]}." >&2
            exit 1
          fi

          candidate=${chart_packages[0]}
          published="charts/$(basename "${candidate}")"
          if [[ -f "${published}" ]]; then
            if cmp -s "${candidate}" "${published}"; then
              echo "Chart $(basename "${candidate}") is already published with identical bytes."
            elif python3 -I "${GITHUB_WORKSPACE}/scripts/compare-helm-chart-packages.py" "${candidate}" "${published}"; then
              echo "Chart $(basename "${candidate}") is already published with identical normalized contents."
              echo "Keeping the existing archive to preserve its immutable bytes."
            else
              echo "Refusing to overwrite immutable chart archive $(basename "${candidate}")." >&2
              echo "Prepare and promote a new chart version before publishing changed chart contents." >&2
              sha256sum "${published}" "${candidate}" >&2
              exit 1
            fi
          else
            if [[ -e "${published}.prov" ]]; then
              echo "Refusing to pair $(basename "${candidate}") with an orphaned provenance file." >&2
              exit 1
            fi
            cp "${candidate}" "${published}"
            refresh_index=true
          fi

          if [[ ! -f charts/index.yaml ]]; then
            refresh_index=true
          fi
          if [[ "${refresh_index}" == true ]]; then
            if [[ -f charts/index.yaml ]]; then
              helm repo index charts \
                --url "https://orka-agents.github.io/orka/charts" \
                --merge charts/index.yaml
            else
              helm repo index charts --url "https://orka-agents.github.io/orka/charts"
            fi
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No Helm chart changes to publish."
            exit 0
          fi

          git commit -m "Publish Helm chart ${GITHUB_REF_NAME}"
          git push origin HEAD:gh-pages
