name: Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "charts/orka/**"
      - "config/crd/**"
      - "config/rbac/**"
      - "hack/boilerplate.go.txt"
      - "internal/controller/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "scripts/helm-crds.sh"
      - "scripts/compare-helm-chart-packages.py"
      - ".github/workflows/helm-chart.yml"
  pull_request:
    paths:
      - "api/**"
      - "charts/orka/**"
      - "config/crd/**"
      - "config/rbac/**"
      - "hack/boilerplate.go.txt"
      - "internal/controller/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "scripts/helm-crds.sh"
      - "scripts/compare-helm-chart-packages.py"
      - ".github/workflows/helm-chart.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('helm-chart-pr-{0}', github.event.pull_request.number) || 'gh-pages' }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Show Helm version
        run: helm version

      - name: Verify generated CRDs and chart mirror
        run: |
          set -euo pipefail

          make manifests
          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo "Generated manifests or the synchronized Helm CRDs are stale." >&2
            git status --short --untracked-files=all >&2
            exit 1
          fi

      - name: Check CRD synchronization
        run: scripts/helm-crds.sh check

      - name: Lint chart
        run: helm lint charts/orka

      - name: Package chart
        run: |
          set -euo pipefail

          mkdir -p cr-release-packages
          helm package charts/orka --destination cr-release-packages

          shopt -s nullglob
          chart_packages=(cr-release-packages/orka-*.tgz)
          if [[ ${#chart_packages[@]} -ne 1 ]]; then
            echo "Expected exactly one packaged Orka chart, found ${#chart_packages[@]}." >&2
            exit 1
          fi
          scripts/helm-crds.sh check-package "${chart_packages[0]}"

      - name: Verify immutable chart version
        run: |
          set -euo pipefail

          shopt -s nullglob
          chart_packages=(cr-release-packages/orka-*.tgz)
          [[ ${#chart_packages[@]} -eq 1 ]]
          candidate=${chart_packages[0]}
          package_name=$(basename "${candidate}")
          comparison_dir=$(mktemp -d)
          trap 'rm -rf "${comparison_dir}"' EXIT

          set +e
          git ls-remote --exit-code --heads origin gh-pages >/dev/null
          probe_status=$?
          set -e
          case "${probe_status}" in
            0)
              git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
              ;;
            2)
              echo "No published Helm repository exists yet."
              exit 0
              ;;
            *)
              echo "Could not determine whether the gh-pages branch exists." >&2
              exit "${probe_status}"
              ;;
          esac

          for published_path in "charts/${package_name}" "${package_name}"; do
            if ! git cat-file -e "origin/gh-pages:${published_path}" 2>/dev/null; then
              continue
            fi
            published_archive="${comparison_dir}/$(basename "${published_path}")"
            git show "origin/gh-pages:${published_path}" > "${published_archive}"
            if cmp -s "${candidate}" "${published_archive}" || \
               python3 -I scripts/compare-helm-chart-packages.py "${candidate}" "${published_archive}"; then
              echo "Published ${published_path} has identical normalized contents."
            else
              echo "Chart ${package_name} already exists with different contents." >&2
              echo "Bump charts/orka/Chart.yaml before merging this change." >&2
              exit 1
            fi
          done

      - name: Upload validated chart package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-chart-package
          path: cr-release-packages/orka-*.tgz
          if-no-files-found: error
          retention-days: 1

  lifecycle:
    name: Test Helm CRD lifecycle
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KIND_CLUSTER: orka-helm-crd-lifecycle
      KIND_IMAGE: kindest/node:v1.33.7@sha256:d26ef333bdb2cbe9862a0f7c3803ecc7b4303d8cea8e814b481b09949d353040
      KIND_SHA256: eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa
      KIND_VERSION: v0.31.0
      NAMESPACE: orka-helm-crd-lifecycle
      PAUSE_IMAGE_REPOSITORY: registry.k8s.io/pause
      PAUSE_IMAGE_TAG: 3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download validated chart package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-chart-package
          path: cr-release-packages

      - name: Install kind
        run: |
          set -euo pipefail

          curl -fsSL --retry 3 --retry-delay 2 -o ./kind \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          echo "${KIND_SHA256}  ./kind" | sha256sum --check --strict
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Verify install, upgrade, and uninstall CRD behavior
        run: |
          set -euo pipefail

          cleanup() {
            kind delete cluster --name "${KIND_CLUSTER}" || true
          }
          trap cleanup EXIT

          kind create cluster \
            --name "${KIND_CLUSTER}" \
            --image "${KIND_IMAGE}" \
            --wait 90s

          shopt -s nullglob
          chart_packages=(cr-release-packages/orka-*.tgz)
          if [[ ${#chart_packages[@]} -ne 1 ]]; then
            echo "Expected exactly one packaged Orka chart, found ${#chart_packages[@]}." >&2
            exit 1
          fi
          chart_package=${chart_packages[0]}

          expected_crds=$(cat <<'CRDS'
          agentruntimes.core.orka.ai
          agents.core.orka.ai
          providers.core.orka.ai
          repositorymonitors.core.orka.ai
          repositoryscans.core.orka.ai
          skills.core.orka.ai
          substrateactorpools.core.orka.ai
          tasks.core.orka.ai
          tools.core.orka.ai
          CRDS
          )

          list_orka_crds() {
            kubectl get customresourcedefinitions \
              -o jsonpath='{range .items[?(@.spec.group=="core.orka.ai")]}{.metadata.name}{"\n"}{end}' | \
              sed '/^$/d' | sort
          }

          assert_no_orka_crds() {
            local stage=$1
            local actual
            actual=$(list_orka_crds)
            if [[ -n "${actual}" ]]; then
              echo "Expected zero Orka CRDs ${stage}; found:" >&2
              printf '%s\n' "${actual}" >&2
              exit 1
            fi
          }

          assert_all_orka_crds() {
            local stage=$1
            local actual
            local crd
            actual=$(list_orka_crds)
            if [[ "${actual}" != "${expected_crds}" ]]; then
              echo "Orka CRD set mismatch ${stage}." >&2
              diff -u <(printf '%s\n' "${expected_crds}") <(printf '%s\n' "${actual}") >&2 || true
              exit 1
            fi
            while IFS= read -r crd; do
              kubectl wait --for=condition=Established --timeout=60s "crd/${crd}"
            done <<< "${expected_crds}"
          }

          assert_controller_crd_rbac() {
            local release=$1
            local controller_service_account
            local resource
            controller_service_account=$(kubectl \
              --namespace "${NAMESPACE}" \
              get deployment \
              --selector "app.kubernetes.io/component=controller,app.kubernetes.io/instance=${release}" \
              --output jsonpath='{.items[0].spec.template.spec.serviceAccountName}')
            [[ -n "${controller_service_account}" ]] || {
              echo "Could not resolve the Helm controller ServiceAccount." >&2
              exit 1
            }

            for resource in agentruntimes substrateactorpools; do
              kubectl auth can-i list "${resource}.core.orka.ai" \
                --as "system:serviceaccount:${NAMESPACE}:${controller_service_account}" | grep -Fx yes
              kubectl auth can-i update "${resource}.core.orka.ai" \
                --subresource=status \
                --namespace "${NAMESPACE}" \
                --as "system:serviceaccount:${NAMESPACE}:${controller_service_account}" | grep -Fx yes
              kubectl auth can-i update "${resource}.core.orka.ai" \
                --subresource=finalizers \
                --namespace "${NAMESPACE}" \
                --as "system:serviceaccount:${NAMESPACE}:${controller_service_account}" | grep -Fx yes
            done
          }

          release_args=(
            --namespace "${NAMESPACE}"
            --create-namespace
            --set controller.replicas=0
            --set-string controller.image.repository="${PAUSE_IMAGE_REPOSITORY}"
            --set-string controller.image.tag="${PAUSE_IMAGE_TAG}"
            --set controller.image.pullPolicy=IfNotPresent
            --set-string workers.ai.image.repository="${PAUSE_IMAGE_REPOSITORY}"
            --set-string workers.ai.image.tag="${PAUSE_IMAGE_TAG}"
            --set-string workers.harnessWrapper.image.repository="${PAUSE_IMAGE_REPOSITORY}"
            --set-string workers.harnessWrapper.image.tag="${PAUSE_IMAGE_TAG}"
            --set workers.harnessWrapper.image.pullPolicy=IfNotPresent
            --set-string workers.harnessWrapper.auth.token=mock-token
          )

          assert_no_orka_crds "before installation"

          helm install orka-skip-crds "${chart_package}" \
            "${release_args[@]}" \
            --skip-crds
          assert_no_orka_crds "after helm install --skip-crds"

          helm upgrade orka-skip-crds "${chart_package}" \
            --namespace "${NAMESPACE}" \
            --reuse-values
          assert_no_orka_crds "after an ordinary helm upgrade"

          scripts/helm-crds.sh apply-package "${chart_package}" \
            --kube-context "kind-${KIND_CLUSTER}"
          assert_all_orka_crds "after the explicit CRD-first upgrade step"

          kubectl patch crd/tasks.core.orka.ai \
            --type json \
            --patch '[{"op":"add","path":"/spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/staleField","value":{"type":"string"}}]'
          kubectl get crd/tasks.core.orka.ai --output json | \
            jq -e '.spec.versions[0].schema.openAPIV3Schema.properties.spec.properties.staleField.type == "string"' >/dev/null
          scripts/helm-crds.sh apply-package "${chart_package}" \
            --kube-context "kind-${KIND_CLUSTER}"
          if kubectl get crd/tasks.core.orka.ai --output json | \
             jq -e '.spec.versions[0].schema.openAPIV3Schema.properties.spec.properties.staleField' >/dev/null; then
            echo "Guarded CRD migration did not remove a stale schema field." >&2
            exit 1
          fi

          helm uninstall orka-skip-crds --namespace "${NAMESPACE}"
          assert_all_orka_crds "after uninstalling the migrated release"

          while IFS= read -r crd; do
            kubectl delete "crd/${crd}"
          done <<< "${expected_crds}"
          assert_no_orka_crds "after test-only CRD cleanup"

          helm install orka-fresh-crds "${chart_package}" "${release_args[@]}"
          assert_all_orka_crds "after a normal fresh install"
          assert_controller_crd_rbac orka-fresh-crds

          helm uninstall orka-fresh-crds --namespace "${NAMESPACE}"
          assert_all_orka_crds "after helm uninstall"

  publish:
    name: Publish Helm chart repository
    needs:
      - lifecycle
      - validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download validated chart package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-chart-package
          path: cr-release-packages

      - name: Show Helm version
        run: helm version

      - name: Publish chart repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf gh-pages
          git init gh-pages
          cd gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          mkdir -p charts
          refresh_index=false

          # Migrate chart archives and any matching provenance files as atomic pairs
          # from the previous root-level repository layout.
          shopt -s nullglob
          for artifact in ./*.tgz; do
            target="charts/$(basename "${artifact}")"
            provenance="${artifact}.prov"
            target_provenance="${target}.prov"

            if [[ -e "${target}" ]]; then
              if ! cmp -s "${artifact}" "${target}"; then
                if [[ -e "${provenance}" ]]; then
                  echo "Refusing to normalize $(basename "${artifact}") because its provenance signs the exact archive bytes." >&2
                  exit 1
                fi
                if ! python3 -I "${GITHUB_WORKSPACE}/scripts/compare-helm-chart-packages.py" "${artifact}" "${target}"; then
                  echo "Conflicting root and charts/ archives exist for $(basename "${artifact}")." >&2
                  exit 1
                fi
              fi
              rm -f "${artifact}"

              if [[ -e "${provenance}" ]]; then
                if [[ -e "${target_provenance}" ]]; then
                  if ! cmp -s "${provenance}" "${target_provenance}"; then
                    echo "Conflicting root and charts/ provenance files exist for $(basename "${provenance}")." >&2
                    exit 1
                  fi
                  rm -f "${provenance}"
                else
                  mv "${provenance}" "${target_provenance}"
                fi
              fi
            else
              if [[ -e "${target_provenance}" ]]; then
                echo "Refusing to pair $(basename "${artifact}") with an orphaned charts/ provenance file." >&2
                exit 1
              fi
              mv "${artifact}" "${target}"
              if [[ -e "${provenance}" ]]; then
                mv "${provenance}" "${target_provenance}"
              fi
            fi
            refresh_index=true
          done

          orphaned_provenance=(./*.prov)
          if [[ ${#orphaned_provenance[@]} -ne 0 ]]; then
            echo "Refusing to migrate orphaned root-level provenance files:" >&2
            printf '  %s\n' "${orphaned_provenance[@]}" >&2
            exit 1
          fi
          if [[ -f index.yaml && ! -f charts/index.yaml ]]; then
            mv index.yaml charts/index.yaml
            refresh_index=true
          elif [[ -f index.yaml ]]; then
            rm -f index.yaml
            refresh_index=true
          fi

          chart_packages=(../cr-release-packages/orka-*.tgz)
          if [[ ${#chart_packages[@]} -ne 1 ]]; then
            echo "Expected exactly one validated Orka chart, found ${#chart_packages[@]}." >&2
            exit 1
          fi

          candidate=${chart_packages[0]}
          published="charts/$(basename "${candidate}")"
          if [[ -f "${published}" ]]; then
            if cmp -s "${candidate}" "${published}"; then
              echo "Chart $(basename "${candidate}") is already published with identical bytes."
            elif python3 -I "${GITHUB_WORKSPACE}/scripts/compare-helm-chart-packages.py" "${candidate}" "${published}"; then
              echo "Chart $(basename "${candidate}") is already published with identical normalized contents."
              echo "Keeping the existing archive to preserve its immutable bytes."
            else
              echo "Refusing to overwrite immutable chart archive $(basename "${candidate}")." >&2
              echo "Bump charts/orka/Chart.yaml version before publishing changed chart contents." >&2
              sha256sum "${published}" "${candidate}" >&2
              exit 1
            fi
          else
            if [[ -e "${published}.prov" ]]; then
              echo "Refusing to pair $(basename "${candidate}") with an orphaned provenance file." >&2
              exit 1
            fi
            cp "${candidate}" "${published}"
            refresh_index=true
          fi

          if [[ ! -f charts/index.yaml ]]; then
            refresh_index=true
          fi
          if [[ "${refresh_index}" == true ]]; then
            if [[ -f charts/index.yaml ]]; then
              helm repo index charts \
                --url "https://orka-agents.github.io/orka/charts" \
                --merge charts/index.yaml
            else
              helm repo index charts --url "https://orka-agents.github.io/orka/charts"
            fi
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No Helm chart changes to publish."
            exit 0
          fi

          git commit -m "Publish Helm chart"
          git push origin HEAD:gh-pages
